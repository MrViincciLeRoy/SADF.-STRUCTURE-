<head>

<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#060609;color:#e2e8f0;font-family:'Courier New',monospace;overflow:hidden;height:100vh}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:#111}::-webkit-scrollbar-thumb{background:#333}
.fade-in{animation:fadeIn .25s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

/* Tactical radiating pulse animation mapped directly to Leaflet DOM injection points */
@keyframes tacticalPulse {
  0% { transform: scale(0.6); opacity: 0.9; box-shadow: 0 0 0 0 var(--pulse-color); }
  70% { transform: scale(1.6); opacity: 0; box-shadow: 0 0 0 14px var(--pulse-color); }
  100% { transform: scale(0.6); opacity: 0; box-shadow: 0 0 0 0 var(--pulse-color); }
}

.custom-tactical-marker {
  background: none;
  border: none;
}

.pulse-ring {
  position: absolute;
  width: 32px;
  height: 32px;
  border-radius: 50%;
  border: 1.5px solid var(--pulse-color);
  background: transparent;
  pointer-events: none;
  left: -16px;
  top: -16px;
  animation: tacticalPulse 2.2s infinite cubic-bezier(0.25, 0, 0, 1);
}

.node-core {
  width: 20px;
  height: 20px;
  border-radius: 50%;
  background: #060609;
  border: 2px solid var(--pulse-color);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  position: absolute;
  left: -10px;
  top: -10px;
  z-index: 2;
  cursor: pointer;
  transition: all 0.2s ease;
}

.node-core:hover {
  background: var(--pulse-color);
  transform: scale(1.25);
  box-shadow: 0 0 15px var(--pulse-color);
}

/* Override Leaflet UI to fit clean system look */
.leaflet-container {
  background: #09090e !important;
}
.leaflet-bar {
  border: 1px solid #1f2937 !important;
}
.leaflet-bar a {
  background-color: #0f0f1a !important;
  color: #9ca3af !important;
  border-bottom: 1px solid #1f2937 !important;
}
.leaflet-bar a:hover {
  background-color: #1e293b !important;
  color: #fff !important;
}
</style>
</head>
<body>

function App() {
  const [activeNode, setActiveNode] = useState(null);
  const [filterLevel, setFilterLevel] = useState("ALL");
  const mapRef = useRef(null);
  const leafletMapInstance = useRef(null);
  const markersRef = useRef([]);

  const filteredHQ = useMemo(() => {
    if (filterLevel === "ALL") return BASE_HQ;
    return BASE_HQ.filter(node => node.level === filterLevel);
  }, [filterLevel]);

  // Initializing the Leaflet Dynamic Map Framework
  useEffect(() => {
    if (!leafletMapInstance.current) {
      // Setup map, centered globally over South Africa
      leafletMapInstance.current = L.map('map', {
        zoomControl: false,
        minZoom: 5,
        maxZoom: 16
      }).setView([-28.5, 25.0], 6);

      // CartoDB Dark Matter tileset deployment matching index theme context
      L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; OpenStreetMap &copy; CARTO',
        subdomains: 'abcd'
      }).addTo(leafletMapInstance.current);

      L.control.zoom({ position: 'topright' }).addTo(leafletMapInstance.current);
    }
  }, []);

  // Update markers when filters mutate
  useEffect(() => {
    if (leafletMapInstance.current) {
      // Clear legacy active markers
      markersRef.current.forEach(marker => marker.remove());
      markersRef.current = [];

      // Render updated array elements
      filteredHQ.forEach(node => {
        const customHtml = `
          <div style="position:relative; width:0; height:0;" class="radar-node-wrapper">
            <div class="pulse-ring" style="--pulse-color: ${node.color}"></div>
            <div class="node-core" style="--pulse-color: ${node.color}">${node.icon}</div>
          </div>
        `;

        const tacticalIcon = L.divIcon({
          className: 'custom-tactical-marker',
          html: customHtml,
          iconSize: [0, 0],
          iconAnchor: [0, 0]
        });

        const marker = L.marker([node.lat, node.lng], { icon: tacticalIcon })
          .addTo(leafletMapInstance.current);

        // Bind interactive event loops
        marker.on('mouseover', () => setActiveNode(node));
        marker.on('click', () => {
          const encodedLevel = encodeURIComponent(node.level);
          const encodedNode = encodeURIComponent(node.n);
          window.location.href = `index.html?view=${encodedLevel}&search=${encodedNode}`;
        });

        markersRef.current.push(marker);
      });
    }
  }, [filteredHQ]);

  // Command panel viewport relocation engine
  const focusLocation = (lat, lng, zoom) => {
    if (leafletMapInstance.current) {
      leafletMapInstance.current.setView([lat, lng], zoom, {
        animate: true,
        duration: 1.2
      });
    }
  };

  return (
    <div className="fade-in" style={{ display: "flex", flexDirection: "column", height: "100vh" }}>
      {/* Tactical Control Header */}
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", padding: "14px 16px", borderBottom: "1px solid #111827", background: "#0a0a0f" }}>
        <div>
          <div style={{ fontSize: "9px", letterSpacing: "3px", color: "#3b82f6" }}>● STRATEGIC LIVE COMMAND NET</div>
          <div style={{ fontSize: "16px", fontWeight: "900", letterSpacing: "2px", color: "#fff" }}>SANDF INTEGRATED GEOSPATIAL MAP</div>
          <div style={{ fontSize: "9px", color: "#4b5563", marginTop: "2px" }}>Hover over tracking indicators for live intelligence telemetry. Click any node to open its structural context.</div>
        </div>
        <a href="index.html" style={{
          background: "#0f0f1a", border: "1px solid #374151", color: "#9ca3af",
          padding: "8px 12px", cursor: "pointer", fontSize: "9px", letterSpacing: "2px", textDecoration: "none", borderRadius: "2px", fontFamily: "Courier New"
        }}><i className="fa-solid fa-network-wired" style={{ marginRight: "6px" }}></i> TACTICAL TREE</a>
      </div>

      {/* Primary Dashboard Split Workspace */}
      <div style={{ display: "flex", flexGrow: 1, overflow: "hidden", position: "relative" }}>
        
        {/* Left Side Quick Relocation Telemetry Panel */}
        <div style={{ width: "300px", background: "#0a0a0f", borderRight: "1px solid #1f2937", display: "flex", flexDirection: "column", padding: "12px", gap: "10px", overflowY: "auto" }}>
          <div style={{ fontSize: "9px", letterSpacing: "2px", color: "#4b5563", fontWeight: "bold" }}>STRATEGIC HQ COMMANDS</div>
          
          <div onClick={() => focusLocation(-25.8182, 28.2531, 11)} style={{ background: "#111119", border: "1px solid #1f2937", borderLeft: "3px solid #3b82f6", padding: "8px", cursor: "pointer", borderRadius: "2px" }}>
            <div style={{ fontSize: "10px", fontWeight: "bold" }}>Defence Headquarters</div>
            <div style={{ fontSize: "8px", color: "#6b7280", marginTop: "2px" }}>Pretoria Complex / Joint Ops</div>
          </div>

          <div onClick={() => focusLocation(-25.8115, 28.1632, 11)} style={{ background: "#111119", border: "1px solid #1f2937", borderLeft: "3px solid #ef4444", padding: "8px", cursor: "pointer", borderRadius: "2px" }}>
            <div style={{ fontSize: "10px", fontWeight: "bold" }}>Special Forces Command</div>
            <div style={{ fontSize: "8px", color: "#6b7280", marginTop: "2px" }}>SFHQ / Phalaborwa / Langebaan</div>
          </div>

          <div onClick={() => focusLocation(-29.0982, 26.1821, 11)} style={{ background: "#111119", border: "1px solid #1f2937", borderLeft: "3px solid #fb923c", padding: "8px", cursor: "pointer", borderRadius: "2px" }}>
            <div style={{ fontSize: "10px", fontWeight: "bold" }}>Army Support Core (Tempe)</div>
            <div style={{ fontSize: "8px", color: "#6b7280", marginTop: "2px" }}>1 SAI / 45 Para / Engineers</div>
          </div>

          <div onClick={() => focusLocation(-25.8291, 28.2215, 11)} style={{ background: "#111119", border: "1px solid #1f2937", borderLeft: "3px solid #06b6d4", padding: "8px", cursor: "pointer", borderRadius: "2px" }}>
            <div style={{ fontSize: "10px", fontWeight: "bold" }}>Air Force Hubs (Waterkloof)</div>
            <div style={{ fontSize: "8px", color: "#6b7280", marginTop: "2px" }}>Air Comm / Lift & Transport</div>
          </div>

          <div onClick={() => focusLocation(-34.1915, 18.4325, 11)} style={{ background: "#111119", border: "1px solid #1f2937", borderLeft: "3px solid #f59e0b", padding: "8px", cursor: "pointer", borderRadius: "2px" }}>
            <div style={{ fontSize: "10px", fontWeight: "bold" }}>Naval Fleet Base (Simon's Town)</div>
            <div style={{ fontSize: "8px", color: "#6b7280", marginTop: "2px" }}>Frigate Squadron / Submarines</div>
          </div>

          {/* Reference Key Summary */}
          <div style={{ marginTop: "auto", background: "#0f0f1a", border: "1px solid #1f2937", padding: "10px", borderRadius: "2px", fontSize: "8px" }}>
            <div style={{ letterSpacing: "1px", color: "#4b5563", fontWeight: "bold", marginBottom: "6px" }}>HIERARCHY CORES</div>
            <div style={{ display: "flex", flexDirection: "column", gap: "4px" }}>
              <div style={{ display: "flex", alignItems: "center", gap: "6px" }}>
                <span style={{ width: "6px", height: "6px", background: "#fb923c", borderRadius: "50%" }}></span>
                <span style={{ color: "#9ca3af" }}>Orange: Battalion Scale (600+)</span>
              </div>
              <div style={{ display: "flex", alignItems: "center", gap: "6px" }}>
                <span style={{ width: "6px", height: "6px", background: "#f472b6", borderRadius: "50%" }}></span>
                <span style={{ color: "#9ca3af" }}>Pink: Company / Squadron (~110)</span>
              </div>
            </div>
          </div>
        </div>

        {/* Live Map Canvas Component Box */}
        <div style={{ flexGrow: 1, position: "relative", background: "#09090e" }}>
          
          {/* Layer Controls Floating Over Top Left Map Container */}
          <div style={{ position: "absolute", top: "12px", left: "12px", zIndex: 1000, display: "flex", gap: "4px", background: "rgba(6,6,9,0.85)", padding: "4px", border: "1px solid #1f2937", borderRadius: "2px" }}>
            {["ALL", "BATTALION", "COMPANY"].map(l => (
              <button key={l} onClick={() => setFilterLevel(l)} style={{
                background: filterLevel === l ? "#3b82f622" : "transparent",
                color: filterLevel === l ? "#3b82f6" : "#4b5563",
                border: `1px solid ${filterLevel === l ? "#3b82f6" : "#1f2937"}`,
                padding: "4px 8px", fontSize: "8px", letterSpacing: "1px", cursor: "pointer", fontFamily: "Courier New", borderRadius: "2px"
              }}>{l} SCALE</button>
            ))}
          </div>

          <div id="map" style={{ width: "100%", height: "100%" }}></div>

          {/* Floating Right Readout Telemetry Overlay */}
          <div style={{ position: "absolute", bottom: "16px", right: "16px", zIndex: 1000, width: "280px", background: "rgba(15,15,26,0.9)", border: "1px solid #1f2937", padding: "12px", borderRadius: "2px", backdropFilter: "blur(4px)" }}>
            <div style={{ fontSize: "8px", letterSpacing: "2px", color: "#6b7280", marginBottom: "6px" }}>SECURE TELEMETRY FEED</div>
            {activeNode ? (
              <div className="fade-in">
                <div style={{ display: "flex", alignItems: "center", gap: "6px", marginBottom: "6px" }}>
                  <span style={{ fontSize: "14px" }}>{activeNode.icon}</span>
                  <div>
                    <div style={{ fontSize: "10px", fontWeight: "bold", color: "#fff", lineHeight: "1.2" }}>{activeNode.n}</div>
                    <div style={{ fontSize: "7px", color: activeNode.color, letterSpacing: "1px" }}>{activeNode.level} THREAT RESOLUTION CORE</div>
                  </div>
                </div>
                <div style={{ fontSize: "8px", color: "#9ca3af", marginBottom: "6px" }}><i className="fa-solid fa-map-pin" style={{ marginRight: "4px", color: "#ef4444" }}></i> {activeNode.loc}</div>
                <div style={{ fontSize: "9px", color: "#6b7280", lineHeight: "1.4", background: "#060609", padding: "6px", borderLeft: `2px solid ${activeNode.color}` }}>
                  {activeNode.desc}
                </div>
                <div style={{ fontSize: "7px", color: "#3b82f6", marginTop: "6px", textAlign: "right" }}>CLICK FEED TO MAP STRUCTURE →</div>
              </div>
            ) : (
              <div style={{ padding: "10px 0", textAlign: "center", color: "#374151", fontSize: "9px" }}>
                <i className="fa-solid fa-satellite-dish" style={{ fontSize: "12px", marginBottom: "4px", display: "block" }}></i>
                AWAITING INTEL CAPTURE PIN SELECTION
              </div>
            )}
          </div>
        </div>

      </div>

      {/* Base Security Classification Sign-off footer */}
      <div style={{ textAlign: "center", padding: "6px", background: "#060609", borderTop: "1px solid #111827", color: "#1f2937", fontSize: "8px", letterSpacing: "2px" }}>
        SANDF Operational Intelligence Pipeline · Geospatial Reference Grid Node Engine
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
