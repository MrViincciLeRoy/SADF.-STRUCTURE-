<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SANDF Operational Map</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>

<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#060609;color:#e2e8f0;font-family:'Courier New',monospace;overflow:hidden}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:#111}::-webkit-scrollbar-thumb{background:#333}

.slide-up { animation: slideUp .25s ease; }
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

/* Leaflet Layout Overrides to match original application theme */
.leaflet-container { background: #060609 !important; font-family: 'Courier New', monospace !important; }
.leaflet-popup-content-wrapper {
  background: #0a0a0f !important;
  color: #e2e8f0 !important;
  border: 1px solid #3b82f6 !important;
  border-radius: 2px !important;
  box-shadow: 0 0 15px rgba(59, 130, 246, 0.2) !important;
}
.leaflet-popup-tip { background: #0a0a0f !important; border: 1px solid #3b82f6 !important; }
.leaflet-popup-close-button { color: #6b7280 !important; }

/* Tactical Custom Pulsing Leaflet Markers */
.custom-tactical-marker { background: none; border: none; }
@keyframes radarPulse {
  0% { transform: scale(0.6); opacity: 0.9; box-shadow: 0 0 0 0 var(--pulse-color); }
  70% { transform: scale(1.6); opacity: 0; box-shadow: 0 0 0 14px var(--pulse-color); }
  100% { transform: scale(0.6); opacity: 0; box-shadow: 0 0 0 0 var(--pulse-color); }
}
.pulse-core {
  width: 22px;
  height: 22px;
  border-radius: 50%;
  background: #060609;
  border: 2px solid var(--pulse-color);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  position: relative;
  transition: all 0.2s ease;
  z-index: 5;
}
.pulse-ring {
  position: absolute;
  width: 32px;
  height: 32px;
  left: -5px;
  top: -5px;
  border-radius: 50%;
  border: 1px solid var(--pulse-color);
  animation: radarPulse 2.2s infinite cubic-bezier(0.25, 0, 0, 1);
  pointer-events: none;
}
.pulse-core:hover {
  transform: scale(1.2);
  background: var(--pulse-color);
  color: #060609 !important;
  box-shadow: 0 0 15px var(--pulse-color);
}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useMemo, useRef } = React;

// Verified Coordinates Array tracking Command Hubs, Airbases, Fleet Ports, Training Wings, and special units.
const MILITARY_ASSETS = [
  // --- SPECIAL FORCES ---
  { n: "5 Special Forces Regiment HQ", loc: "Phalaborwa, Limpopo", lat: -23.9431, lng: 31.1408, level: "BATTALION", color: "#a78bfa", icon: "⚔️", r: "Elite deep infiltration reconnaissance, counter-insurgency and unconventional warfare operations." },
  { n: "4 Special Forces Regiment (Maritime)", loc: "Langebaan, Western Cape", lat: -33.0952, lng: 18.0426, level: "COMPANY", color: "#f472b6", icon: "⚓", r: "Highly specialized marine operational element focused on tactical amphibious reconnaissance and diving operations." },
  
  // --- SOUTH AFRICAN AIR FORCE (SAAF) ---
  { n: "AFB Waterkloof (2 & 35 Squadron Hub)", loc: "Pretoria, Gauteng", lat: -25.8302, lng: 28.2153, level: "BATTALION", color: "#fb923c", icon: "🦅", r: "Strategic airlift command center, multi-role jet defense installations, and long-range logistics corridors." },
  { n: "AFB Hoedspruit (17 Fighter Squadron Command)", loc: "Hoedspruit, Limpopo", lat: -24.3621, lng: 31.0514, level: "COMPANY", color: "#f472b6", icon: "✈️", r: "Frontline tactical base hosting JAS 39 Gripen supersonic combat intercept elements." },
  { n: "AFB Bloemspruit (87 Helicopter Flying School)", loc: "Bloemfontein, Free State", lat: -29.1174, lng: 26.3015, level: "COMPANY", color: "#f472b6", icon: "🚁", r: "Advanced rotary operational flight command specializing in Oryx and Rooivalk deployment drills." },
  
  // --- SOUTH AFRICAN NAVY (SAN) ---
  { n: "SAS Simonsberg / Fleet Command Ports", loc: "Simon's Town, Western Cape", lat: -34.1925, lng: 18.4328, level: "BATTALION", color: "#fb923c", icon: "⚓", r: "Main tactical headquarters managing Valour-class guided missile frigates and diesel-electric submarine strike components." },
  { n: "Naval Station Durban (Sub-Base Node)", loc: "Salisbury Island, Durban", lat: -29.8745, lng: 31.0421, level: "COMPANY", color: "#f472b6", icon: "🌊", r: "Operational intercept post handling regional coastal operations and defense support deployment configurations." },

  // --- INFANTRY BATTALIONS & COMBAT ENGINEERS ---
  { n: "HQ Land Command / 7 Signal Regiment / 1 Mil Hospital", loc: "Thaba Tshwane, Pretoria", lat: -25.7912, lng: 28.1465, level: "BATTALION", color: "#fb923c", icon: "🪖", r: "Supreme administrative hub coordinating main theater communications and critical battlefield healthcare matrix assets." },
  { n: "2 SA Infantry Bn / 2 Field Engineer / 17 Med Bn", loc: "Wallmansthal, Gauteng", lat: -25.5482, lng: 28.2915, level: "BATTALION", color: "#fb923c", icon: "🔨", r: "Mechanized infantry strike element reinforced with counter-mobility combat engineers and field hospitals." },
  { n: "1 SA Infantry Bn / 14 Artillery / 45 Parachute Regiment", loc: "Tempe Base, Bloemfontein", lat: -29.0988, lng: 26.1554, level: "BATTALION", color: "#fb923c", icon: "🪂", r: "Conventional lightning interception airborne teams, mobile artillery groups and structural infantry assets." },
  { n: "Regiment Mooirivier / 4 Artillery Regiment", loc: "Potchefstroom, North West", lat: -26.6985, lng: 27.0854, level: "BATTALION", color: "#fb923c", icon: "🛡️", r: "Heavy mobile armor combat core operating Olifant Mk2 Main Battle Tanks and G6 155mm field weapon arrays." },
  { n: "3 SA Infantry Battalion (Desert Training Wing)", loc: "Kimberley, Northern Cape", lat: -28.7412, lng: 24.7521, level: "BATTALION", color: "#fb923c", icon: "🌵", r: "Core military processing center specializing in arid-zone training configurations and platoon exercises." },
  { n: "8 SA Infantry Battalion (Mechanized Framework)", loc: "Upington, Northern Cape", lat: -28.4114, lng: 21.2563, level: "BATTALION", color: "#fb923c", icon: "🛞", r: "Desert-optimized mechanized strike formations utilizing standard dynamic Ratel fighting variants." },
  { n: "4 SA Infantry Battalion", loc: "Middelburg, Mpumalanga", lat: -25.7725, lng: 29.4612, level: "BATTALION", color: "#fb923c", icon: "🚛", r: "Motorized infantry brigades executing tactical territorial security operations using Samil convoy groups." },
  { n: "6 SA Infantry Battalion (Mountain Warfare Section)", loc: "Oudtshoorn, Western Cape", lat: -33.6012, lng: 22.2145, level: "BATTALION", color: "#fb923c", icon: "🏔️", r: "Light infantry structural command specialized for combat execution across steep mountain environments." },
  { n: "9 SA Infantry Battalion (Coastal Littoral Component)", loc: "Mtubatuba, KwaZulu-Natal", lat: -28.4145, lng: 32.1812, level: "BATTALION", color: "#fb923c", icon: "🌴", r: "Motorized combat units trained for thick coastal undergrowth tracking and wet marshlands reconnaissance." },
  { n: "21 SA Infantry Battalion", loc: "Grahamstown, Eastern Cape", lat: -33.3165, lng: 26.5162, level: "BATTALION", color: "#fb923c", icon: "💂", r: "Primary framework replenishment asset protecting internal provincial deployment lines." }
];

function App() {
  const [selectedAsset, setSelectedAsset] = useState(null);
  const [filter, setFilter] = useState("ALL");
  const mapRef = useRef(null);
  const markersGroupRef = useRef(null);

  const filteredAssets = useMemo(() => {
    if (filter === "ALL") return MILITARY_ASSETS;
    return MILITARY_ASSETS.filter(item => item.level === filter);
  }, [filter]);

  // Handle Leaflet Background Map initialization
  useEffect(() => {
    // Center view broadly over South African airspace
    mapRef.current = L.map('map-viewport', {
      zoomControl: false,
      attributionControl: false
    }).setView([-28.5, 25.0], 6);

    // Apply premium Dark Matter CartoDB GIS tileset asset
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
      maxZoom: 18
    }).addTo(mapRef.current);

    // Reposition default zoom trigger controls out of map framework design space
    L.control.zoom({ position: 'topright' }).addTo(mapRef.current);
    markersGroupRef.current = L.layerGroup().addTo(mapRef.current);

    return () => {
      if (mapRef.current) mapRef.current.remove();
    };
  }, []);

  // Update real-world coordinates on layout when array or filter states morph
  useEffect(() => {
    if (!markersGroupRef.current || !mapRef.current) return;

    markersGroupRef.current.clearLayers();

    filteredAssets.forEach(asset => {
      const customHtml = `
        <div style="position: relative; width: 22px; height: 22px; --pulse-color: ${asset.color}">
          <div class="pulse-ring"></div>
          <div class="pulse-core" style="color: ${asset.color}">${asset.icon}</div>
        </div>
      `;

      const markerIcon = L.divIcon({
        className: 'custom-tactical-marker',
        html: customHtml,
        iconSize: [22, 22],
        iconAnchor: [11, 11]
      });

      const marker = L.marker([asset.lat, asset.lng], { icon: markerIcon });
      
      // Bind inline click interception logic to open up full drawer context tracking
      marker.on('click', () => {
        setSelectedAsset(asset);
        mapRef.current.setView([asset.lat, asset.lng], 9, { animate: true, duration: 1 });
      });

      markersGroupRef.current.addLayer(marker);
    });
  }, [filteredAssets]);

  // Trigger automated index routing back into your exact structural data tree profiles
  const handleIndexRouting = (level, name) => {
    window.location.href = `index.html?view=${encodeURIComponent(level)}&search=${encodeURIComponent(name)}`;
  };

  return (
    <div style={{ height: "100vh", width: "100vw", position: "relative", display: "flex", flexDirection: "column" }}>
      
      {/* Absolute Header Overlay Layer */}
      <div style={{
        position: "absolute", top: 12, left: 12, zIndex: 1000,
        background: "rgba(6, 6, 9, 0.85)", backdropFilter: "blur(6px)",
        border: "1px solid #1f2937", padding: "12px 16px", borderRadius: "2px", maxWidth: "calc(100vw - 70px)"
      }}>
        <div style={{ fontSize: "8px", letterSpacing: "3px", color: "#3b82f6", fontWeight: "bold" }}>● GEOSPATIAL C2 GRID</div>
        <div style={{ fontSize: "15px", fontWeight: "900", letterSpacing: "2px", color: "#fff", marginTop: "2px" }}>SANDF OPERATIONAL FIELD MAP</div>
        <div style={{ fontSize: "9px", color: "#6b7280", marginTop: "4px" }}>Click radar nodes to retrieve detailed telemetry.</div>

        {/* Filter Arrays Controls */}
        <div style={{ display: "flex", gap: "4px", marginTop: "10px" }}>
          {["ALL", "BATTALION", "COMPANY"].map(lvl => (
            <button key={lvl} onClick={() => setFilter(lvl)} style={{
              background: filter === lvl ? "#3b82f622" : "transparent",
              color: filter === lvl ? "#3b82f6" : "#4b5563",
              border: `1px solid ${filter === lvl ? "#3b82f6" : "#1f2937"}`,
              padding: "4px 8px", fontSize: "8px", letterSpacing: "1px", cursor: "pointer", borderRadius: "2px"
            }}>{lvl}</button>
          ))}
          <a href="index.html" style={{
            background: "#0f0f1a", border: "1px solid #374151", color: "#9ca3af",
            padding: "4px 8px", fontSize: "8px", letterSpacing: "1px", textDecoration: "none", borderRadius: "2px", marginLeft: "6px"
          }}><i className="fa-solid fa-arrow-left"></i> TREE</a>
        </div>
      </div>

      {/* Leaflet Frame Layout Field takes up 100% full view screen space */}
      <div id="map-viewport" style={{ width: "100%", flexGrow: 1, zIndex: 1 }} />

      {/* Fully Collapsible Context Informational Telemetry Bottom Drawer */}
      {selectedAsset && (
        <div style={{
          position: "absolute", bottom: 0, left: 0, right: 0, zIndex: 2000,
          background: "rgba(10, 10, 15, 0.95)", backdropFilter: "blur(10px)",
          borderTop: `3px solid ${selectedAsset.color}`, padding: "16px 20px"
        }} className="slide-up">
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: "10px" }}>
            <div style={{ display: "flex", gap: "12px", alignItems: "center" }}>
              <div style={{
                width: "40px", height: "40px", borderRadius: "50%", background: `${selectedAsset.color}11`,
                border: `1px solid ${selectedAsset.color}`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: "18px"
              }}>{selectedAsset.icon}</div>
              <div>
                <div style={{ fontSize: "14px", fontWeight: "bold", color: "#fff", letterSpacing: "1px" }}>{selectedAsset.n}</div>
                <div style={{ fontSize: "9px", color: selectedAsset.color, marginTop: "2px" }}>📍 {selectedAsset.loc} • COORDINATE LOCK</div>
              </div>
            </div>
            <button onClick={() => setSelectedAsset(null)} style={{
              background: "transparent", border: "1px solid #1f2937", color: "#6b7280",
              width: "26px", height: "26px", cursor: "pointer", fontSize: "12px", borderRadius: "2px"
            }}>✕</button>
          </div>

          <div style={{ fontSize: "11px", color: "#9ca3af", lineHeight: "1.6", background: "#060609", padding: "10px", border: "1px solid #1f2937" }}>
            <span style={{ color: selectedAsset.color, fontWeight: "bold", marginRight: "6px" }}>[PROFILE SUMMARY]:</span>
            {selectedAsset.r}
          </div>

          {/* Action Link to jump directly into the structural index tree */}
          <button 
            onClick={() => handleIndexRouting(selectedAsset.level, selectedAsset.n)}
            style={{
              width: "100%", marginTop: "12px", padding: "10px", background: selectedAsset.color, color: "#060609",
              border: "none", cursor: "pointer", fontSize: "10px", fontWeight: "bold", letterSpacing: "2px", textTransform: "uppercase", borderRadius: "2px"
            }}>
            <i className="fa-solid fa-arrow-up-right-from-square" style={{ marginRight: "6px" }}></i> Open Branch Structural Intelligence Tree
          </button>
        </div>
      )}

      {/* Discrete Floating Legend Matrix Overlay (Bottom Right Side) */}
      <div style={{
        position: "absolute", bottom: 12, right: 12, zIndex: 1000,
        background: "rgba(6, 6, 9, 0.85)", border: "1px solid #1f2937", padding: "8px 12px", borderRadius: "2px", pointerEvents: "none"
      }}>
        <div style={{ fontSize: "7px", color: "#4b5563", letterSpacing: "1px", marginBottom: "4px", fontWeight: "bold" }}>HIERARCHY INDEX</div>
        <div style={{ display: "flex", flexDirection: "column", gap: "3px" }}>
          <div style={{ display: "flex", alignItems: "center", gap: "6px", fontSize: "8px", color: "#9ca3af" }}>
            <span style={{ width: "6px", height: "6px", background: "#fb923c", borderRadius: "50%" }}></span> Battalion Command Base
          </div>
          <div style={{ display: "flex", alignItems: "center", gap: "6px", fontSize: "8px", color: "#9ca3af" }}>
            <span style={{ width: "6px", height: "6px", background: "#f472b6", borderRadius: "50%" }}></span> Company / Squadron Node
          </div>
          <div style={{ display: "flex", alignItems: "center", gap: "6px", fontSize: "8px", color: "#9ca3af" }}>
            <span style={{ width: "6px", height: "6px", background: "#a78bfa", borderRadius: "50%" }}></span> Special Forces Element
          </div>
        </div>
      </div>

    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/ >);
</script>
</body>
</html>
