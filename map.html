<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SANDF Operational Map</title>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#060609;color:#e2e8f0;font-family:'Courier New',monospace;overflow-x:hidden}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:#111}::-webkit-scrollbar-thumb{background:#333}
.fade-in{animation:fadeIn .25s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

/* Tactical radiating pulse animation */
@keyframes tacticalPulse {
  0% { transform: scale(0.8); opacity: 0.8; box-shadow: 0 0 0 0 var(--pulse-color); }
  70% { transform: scale(1.8); opacity: 0; box-shadow: 0 0 0 12px var(--pulse-color); }
  100% { transform: scale(0.8); opacity: 0; box-shadow: 0 0 0 0 var(--pulse-color); }
}

.radar-node {
  position: absolute;
  cursor: pointer;
  transform: translate(-50%, -50%);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 10;
}

.pulse-ring {
  position: absolute;
  width: 24px;
  height: 24px;
  border-radius: 50%;
  border: 1px solid var(--pulse-color);
  background: transparent;
  pointer-events: none;
  animation: tacticalPulse 2s infinite cubic-bezier(0.25, 0, 0, 1);
}

.node-core {
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: #060609;
  border: 2px solid var(--pulse-color);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 8px;
  z-index: 2;
  transition: all 0.2s ease;
}

.radar-node:hover .node-core {
  background: var(--pulse-color);
  transform: scale(1.2);
  box-shadow: 0 0 12px var(--pulse-color);
}

/* Map Grid Overlay Background */
.grid-overlay {
  background-image: 
    linear-gradient(rgba(18, 24, 38, 0.2) 1px, transparent 1px),
    linear-gradient(90deg, rgba(18, 24, 38, 0.2) 1px, transparent 1px);
  background-size: 20px 20px;
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useMemo } = React;

// Precise coordinates for South Africa SVG viewport (1000x850 grid)
const BASE_HQ = [
  { n: "HQ Land Command / 7 Signal / 1 Mil Hospital / Tech Corps", loc: "Thaba Tshwane, Gauteng", cx: 645, cy: 300, level: "BATTALION", color: "#fb923c", icon: "⚜️", desc: "Strategic operations hub coordinating national armor, signals, and defense medical response." },
  { n: "2 SA Infantry / 2 Field Engineer / 17 Med Bn", loc: "Wallmansthal, Gauteng", cx: 652, cy: 285, level: "BATTALION", color: "#fb923c", icon: "⚜️", desc: "Heavy mechanized infantry and forward engineering deployment assets." },
  { n: "5 SA Infantry", loc: "Doornkop, Gauteng", cx: 635, cy: 312, level: "BATTALION", color: "#fb923c", icon: "⚜️", desc: "High-density urban operations matrix." },
  { n: "2 Squadron (Air Support) / 35 Squadron", loc: "AFB Waterkloof, Gauteng", cx: 648, cy: 295, level: "COMPANY", color: "#f472b6", icon: "🦅", desc: "Frontline air transport fleet and critical logistics runways." },
  { n: "1 SA Infantry / 14 Artillery / 45 Para Bn", loc: "Tempe, Free State", cx: 535, cy: 485, level: "BATTALION", color: "#fb923c", icon: "⚜️", desc: "Central conventional rapid response, heavy airborne element and active training groups." },
  { n: "1 Service Battalion / 1 Eng Support / 3 Mil Hosp", loc: "Bloemfontein, Free State", cx: 542, cy: 495, level: "BATTALION", color: "#fb923c", icon: "⚜️", desc: "Echelon support infrastructure, supply lanes, and tactical bridging assets." },
  { n: "Regiment Mooirivier / 4 Artillery Regiment", loc: "Potchefstroom, NW", cx: 580, cy: 345, level: "BATTALION", color: "#fb923c", icon: "⚜️", desc: "Heavy strike elements fielding Olifant Mk2 main battle tanks and 155mm field assets." },
  { n: "3 SA Infantry Battalion", loc: "Kimberley, N. Cape", cx: 460, cy: 460, level: "BATTALION", color: "#fb923c", icon: "⚜️", desc: "Desert warfare special combat training center." },
  { n: "8 SA Infantry Battalion", loc: "Upington, N. Cape", cx: 310, cy: 450, level: "BATTALION", color: "#fb923c", icon: "⚜️", desc: "Mechanized desert strike group running specialized Ratel deployment profiles." },
  { n: "4 SA Infantry Battalion", loc: "Middelburg, Mpumalanga", cx: 710, cy: 290, level: "BATTALION", color: "#fb923c", icon: "⚜️", desc: "Motorized combat units using regional Samil troop deployment platforms." },
  { n: "7 SA Infantry / 5 Special Forces Regiment", loc: "Phalaborwa, Limpopo", cx: 745, cy: 170, level: "BATTALION", color: "#fb923c", icon: "⚜️", desc: "Deep infiltration recon, elite bushveld tracking, and northern border safeguarding." },
  { n: "17 Squadron (JAS 39 Gripen Command)", loc: "AFB Hoedspruit, Limpopo", cx: 755, cy: 195, level: "COMPANY", color: "#f472b6", icon: "🦅", desc: "Frontline supersonic interception assets." },
  { n: "9 SA Infantry / Natal Mounted Rifles", loc: "Mtubatuba & Durban, KZN", cx: 740, cy: 510, level: "BATTALION", color: "#fb923c", icon: "⚜️", desc: "Coastal combat thicket formations and mobile light armored reconnaissance." },
  { n: "21 SA Infantry Battalion", loc: "Grahamstown, E. Cape", cx: 560, cy: 750, level: "BATTALION", color: "#fb923c", icon: "⚜️", desc: "Eastern Cape regional defensive structural infantry asset." },
  { n: "6 SA Infantry Battalion", loc: "Oudtshoorn, W. Cape", cx: 380, cy: 770, level: "BATTALION", color: "#fb923c", icon: "⚜️", desc: "Light infantry matrix optimized for mountainous terrain warfare." },
  { n: "SAS Simonsberg / SAS Diamant (Fleet HQ)", loc: "Simon's Town, W. Cape", cx: 205, cy: 795, level: "BATTALION", color: "#fb923c", icon: "⚜️", desc: "Valour-class guided missile frigates and Type 209 submarine stealth strike command." },
  { n: "4 Special Forces Regiment (Maritime)", loc: "Langebaanweg, W. Cape", cx: 190, cy: 740, level: "COMPANY", color: "#f472b6", icon: "🦅", desc: "Elite specialized maritime reconnaissance and covert diving strike elements." }
];

function App() {
  const [activeNode, setActiveNode] = useState(null);
  const [filterLevel, setFilterLevel] = useState("ALL");

  const filteredHQ = useMemo(() => {
    if (filterLevel === "ALL") return BASE_HQ;
    return BASE_HQ.filter(node => node.level === filterLevel);
  }, [filterLevel]);

  // Simulates jumping back to index.html with structural search parameters
  const routeToMainStructure = (level, nodeName) => {
    const encodedLevel = encodeURIComponent(level);
    const encodedNode = encodeURIComponent(nodeName);
    window.location.href = `index.html?view=${encodedLevel}&search=${encodedNode}`;
  };

  return (
    <div className="fade-in" style={{ minHeight: "100vh", position: "relative", padding: "16px" }}>
      {/* Tactical Header */}
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: "16px", borderBottom: "1px solid #111827", paddingBottom: "12px" }}>
        <div>
          <div style={{ fontSize: "9px", letterSpacing: "3px", color: "#3b82f6" }}>● STRATEGIC COMMAND NET</div>
          <div style={{ fontSize: "18px", fontWeight: "900", letterSpacing: "3px", color: "#fff" }}>GEOSPATIAL DEPLOYMENT MAP</div>
          <div style={{ fontSize: "9px", color: "#4b5563", marginTop: "2px" }}>Tracking operational Headquarters. Click any node to open its structural view.</div>
        </div>
        <a href="index.html" style={{
          background: "#0f0f1a", border: "1px solid #374151", color: "#9ca3af",
          padding: "8px 12px", cursor: "pointer", fontSize: "9px", letterSpacing: "2px", textDecoration: "none", borderRadius: "2px"
        }}><i className="fa-solid fa-bars-staggered" style={{ marginRight: "6px" }}></i> TACTICAL TREE</a>
      </div>

      {/* Layer/Filter Controls */}
      <div style={{ display: "flex", gap: "6px", marginBottom: "14px", flexWrap: "wrap" }}>
        {["ALL", "BATTALION", "COMPANY"].map(l => (
          <button key={l} onClick={() => setFilterLevel(l)} style={{
            background: filterLevel === l ? "#3b82f622" : "transparent",
            color: filterLevel === l ? "#3b82f6" : "#4b5563",
            border: `1px solid ${filterLevel === l ? "#3b82f6" : "#1f2937"}`,
            padding: "6px 12px", fontSize: "9px", letterSpacing: "2px", cursor: "pointer", borderRadius: "2px"
          }}>{l} SCALE NODES</button>
        ))}
      </div>

      <div style={{ display: "flex", gap: "16px", flexWrap: "wrap" }}>
        {/* Interactive Tactical Map Component Canvas */}
        <div className="grid-overlay" style={{
          flex: "1 1 600px", position: "relative", background: "#09090e", 
          border: "1px solid #1f2937", borderRadius: "2px", overflow: "hidden", minHeight: "580px"
        }}>
          
          {/* Geometrically Clean SVG Path Outline of South Africa */}
          <svg viewBox="100 80 800 750" style={{ width: "100%", height: "100%", stroke: "#1e293b", strokeWidth: "1.5", fill: "#0c111d" }}>
            <path d="M 230 730 
                     Q 170 760 190 790 
                     Q 240 820 320 780 
                     Q 400 810 500 790 
                     Q 570 810 640 760 
                     Q 700 700 760 620 
                     Q 810 540 770 480 
                     Q 830 380 770 240 
                     Q 780 140 700 110 
                     Q 600 120 540 180 
                     Q 450 160 380 220 
                     Q 280 230 250 310 
                     Q 280 400 240 500 
                     Q 180 580 230 730 Z" />
            
            {/* Internal Provincial Reference Dotted Lines */}
            <path d="M 380 220 Q 420 400 500 420 M 540 180 L 535 485 M 640 760 Q 600 550 535 485 M 240 500 Q 450 540 535 485 M 770 480 Q 600 480 535 485" 
                  style={{ fill: "none", stroke: "#111827", strokeWidth: "1", strokeDasharray: "4 4" }} />
          </svg>

          {/* Plotting Radiating Radar Nodes onto Coordinate Space */}
          {filteredHQ.map((node, index) => (
            <div key={index} className="radar-node" 
                 style={{ left: `${(node.cx / 10)}%`, top: `${(node.cy / 8.5)}%`, '--pulse-color': node.color }}
                 onMouseEnter={() => setActiveNode(node)}
                 onClick={() => routeToMainStructure(node.level, node.n)}>
              <div className="pulse-ring"></div>
              <div className="node-core">{node.icon}</div>
            </div>
          ))}
        </div>

        {/* Real-time Side Telemetry Feed Dashboard */}
        <div style={{ flex: "1 1 280px", display: "flex", flexDirection: "column", gap: "12px" }}>
          <div style={{ background: "#0f0f1a", border: "1px solid #1f2937", padding: "14px", borderRadius: "2px" }}>
            <div style={{ fontSize: "9px", letterSpacing: "2px", color: "#6b7280", marginBottom: "8px" }}>TELEMETRY READOUT</div>
            
            {activeNode ? (
              <div className="fade-in">
                <div style={{ display: "flex", alignItems: "center", gap: "8px", marginBottom: "8px" }}>
                  <span style={{ fontSize: "16px" }}>{activeNode.icon}</span>
                  <div>
                    <div style={{ fontSize: "11px", fontWeight: "bold", color: "#fff", lineHeight: "1.3" }}>{activeNode.n}</div>
                    <div style={{ fontSize: "8px", color: activeNode.color, letterSpacing: "1px", marginTop: "2px" }}>{activeNode.level} PROFILE STRUCT</div>
                  </div>
                </div>
                <div style={{ fontSize: "9px", color: "#9ca3af", marginBottom: "8px" }}><i className="fa-solid fa-location-dot" style={{ marginRight: "4px", color: "#ef4444" }}></i> {activeNode.loc}</div>
                <div style={{ fontSize: "10px", color: "#6b7280", lineHeight: "1.6", background: "#060609", padding: "8px", borderLeft: `2px solid ${activeNode.color}` }}>
                  {activeNode.desc}
                </div>
                <div style={{ fontSize: "8px", color: "#3b82f6", marginTop: "10px", textAlign: "right", letterSpacing: "1px" }}>CLICK NODE TO ROUTE TO TREE →</div>
              </div>
            ) : (
              <div style={{ padding: "30px 0", textAlign: "center", color: "#374151", fontSize: "10px" }}>
                <i className="fa-solid fa-satellite-dish" style={{ fontSize: "16px", marginBottom: "8px", display: "block" }}></i>
                HOVER OVER RADAR NODE TO LOCK SIGNALS
              </div>
            )}
          </div>

          {/* Strategic Reference Key Legibility Box */}
          <div style={{ background: "#0f0f1a", border: "1px solid #1f2937", padding: "12px", borderRadius: "2px", fontSize: "9px" }}>
            <div style={{ letterSpacing: "2px", color: "#374151", fontWeight: "bold", marginBottom: "6px" }}>HIERARCHICAL COLOR MATRIX</div>
            <div style={{ display: "flex", flexDirection: "column", gap: "6px" }}>
              <div style={{ display: "flex", alignItems: "center", gap: "6px" }}>
                <span style={{ width: "8px", height: "8px", background: "#fb923c", borderRadius: "50%" }}></span>
                <span style={{ color: "#9ca3af" }}>Battalion Headquarters (600–800 Personnel Scope)</span>
              </div>
              <div style={{ display: "flex", alignItems: "center", gap: "6px" }}>
                <span style={{ width: "8px", height: "8px", background: "#f472b6", borderRadius: "50%" }}></span>
                <span style={{ color: "#9ca3af" }}>Company / Air Squadron Hubs (~110 Personnel Scope)</span>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div style={{ textAlign: "center", marginTop: "24px", color: "#1f2937", fontSize: "8px", letterSpacing: "2px" }}>
        SANDF · GEOSPATIAL COMMAND ROUTER ENGINE · SECURE ENCRYPTED NETWORK FEED
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
