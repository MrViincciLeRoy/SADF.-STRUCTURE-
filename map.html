<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SANDF Operational Map</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" />
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#060609;color:#e2e8f0;font-family:'Courier New',monospace;overflow-x:hidden}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:#111}::-webkit-scrollbar-thumb{background:#333}
.fade-in{animation:fadeIn .25s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

/* Tactical radiating pulse animation calibrated for Leaflet overlays */
@keyframes tacticalPulse {
  0% { transform: scale(0.6); opacity: 0.9; box-shadow: 0 0 0 0 var(--pulse-color); }
  70% { transform: scale(1.6); opacity: 0; box-shadow: 0 0 0 14px var(--pulse-color); }
  100% { transform: scale(0.6); opacity: 0; box-shadow: 0 0 0 0 var(--pulse-color); }
}

/* Custom Leaflet Marker container overrides */
.leaflet-marker-icon {
  background: none !important;
  border: none !important;
}

.radar-node-container {
  position: relative;
  width: 30px;
  height: 30px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
}

.pulse-ring {
  position: absolute;
  width: 32px;
  height: 32px;
  border-radius: 50%;
  border: 1.5px solid var(--pulse-color);
  background: transparent;
  pointer-events: none;
  animation: tacticalPulse 2s infinite cubic-bezier(0.25, 0, 0, 1);
}

.node-core {
  width: 16px;
  height: 16px;
  border-radius: 50%;
  background: #060609;
  border: 2px solid var(--pulse-color);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 9px;
  z-index: 2;
  transition: all 0.2s ease;
}

.radar-node-container:hover .node-core {
  background: var(--pulse-color);
  transform: scale(1.25);
  box-shadow: 0 0 15px var(--pulse-color);
}

/* Dark Tactical Custom Popup Cards for Leaflet */
.leaflet-popup-content-wrapper {
  background: #0f0f1a !important;
  color: #e2e8f0 !important;
  border: 1px solid #1f2937;
  border-radius: 2px !important;
  font-family: 'Courier New', monospace;
  padding: 2px;
}

.leaflet-popup-tip {
  background: #0f0f1a !important;
  border: 1px solid #1f2937;
}

.leaflet-popup-close-button {
  color: #6b7280 !important;
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useMemo, useEffect, useRef } = React;

// Calibrated true Latitude & Longitude structural matrix array coordinates for South Africa bases
const BASE_HQ = [
  { n: "HQ Land Command / 7 Signal / 1 Mil Hospital / Tech Corps", loc: "Thaba Tshwane, Gauteng", lat: -25.7915, lng: 28.1468, level: "BATTALION", color: "#fb923c", icon: "⚜️", desc: "Strategic operations hub coordinating national armor, signals, and defense medical response." },
  { n: "2 SA Infantry / 2 Field Engineer / 17 Med Bn", loc: "Wallmansthal, Gauteng", lat: -25.5342, lng: 28.2891, level: "BATTALION", color: "#fb923c", icon: "⚜️", desc: "Heavy mechanized infantry and forward engineering deployment assets." },
  { n: "5 SA Infantry", loc: "Doornkop, Gauteng", lat: -26.2166, lng: 27.8433, level: "BATTALION", color: "#fb923c", icon: "⚜️", desc: "High-density urban operations matrix." },
  { n: "2 Squadron (Air Support) / 35 Squadron", loc: "AFB Waterkloof, Gauteng", lat: -25.8302, lng: 28.2145, level: "COMPANY", color: "#f472b6", icon: "🦅", desc: "Frontline air transport fleet and critical logistics runways." },
  { n: "1 SA Infantry / 14 Artillery / 45 Para Bn", loc: "Tempe, Free State", lat: -29.0988, lng: 26.1664, level: "BATTALION", color: "#fb923c", icon: "⚜️", desc: "Central conventional rapid response, heavy airborne element and active training groups." },
  { n: "1 Service Battalion / 1 Eng Support / 3 Mil Hosp", loc: "Bloemfontein, Free State", lat: -29.1172, lng: 26.2204, level: "BATTALION", color: "#fb923c", icon: "⚜️", desc: "Echelon support infrastructure, supply lanes, and tactical bridging assets." },
  { n: "Regiment Mooirivier / 4 Artillery Regiment", loc: "Potchefstroom, NW", lat: -26.6989, lng: 27.0792, level: "BATTALION", color: "#fb923c", icon: "⚜️", desc: "Heavy strike elements fielding Olifant Mk2 main battle tanks and 155mm field assets." },
  { n: "3 SA Infantry Battalion", loc: "Kimberley, N. Cape", lat: -28.7424, lng: 24.7471, level: "BATTALION", color: "#fb923c", icon: "⚜️", desc: "Desert warfare special combat training center." },
  { n: "8 SA Infantry Battalion", loc: "Upington, N. Cape", lat: -28.4024, lng: 21.2618, level: "BATTALION", color: "#fb923c", icon: "⚜️", desc: "Mechanized desert strike group running specialized Ratel deployment profiles." },
  { n: "4 SA Infantry Battalion", loc: "Middelburg, Mpumalanga", lat: -25.7667, lng: 29.4622, level: "BATTALION", color: "#fb923c", icon: "⚜️", desc: "Motorized combat units using regional Samil troop deployment platforms." },
  { n: "7 SA Infantry / 5 Special Forces Regiment", loc: "Phalaborwa, Limpopo", lat: -23.9412, lng: 31.1402, level: "BATTALION", color: "#fb923c", icon: "⚜️", desc: "Deep infiltration recon, elite bushveld tracking, and northern border safeguarding." },
  { n: "17 Squadron (JAS 39 Gripen Command)", loc: "AFB Hoedspruit, Limpopo", lat: -24.3542, lng: 31.0514, level: "COMPANY", color: "#f472b6", icon: "🦅", desc: "Frontline supersonic interception assets." },
  { n: "9 SA Infantry / Natal Mounted Rifles", loc: "Mtubatuba & Durban, KZN", lat: -28.4167, lng: 32.1833, level: "BATTALION", color: "#fb923c", icon: "⚜️", desc: "Coastal combat thicket formations and mobile light armored reconnaissance." },
  { n: "21 SA Infantry Battalion", loc: "Grahamstown, E. Cape", lat: -33.3151, lng: 26.5186, level: "BATTALION", color: "#fb923c", icon: "⚜️", desc: "Eastern Cape regional defensive structural infantry asset." },
  { n: "6 SA Infantry Battalion", loc: "Oudtshoorn, W. Cape", lat: -33.6002, lng: 22.1994, level: "BATTALION", color: "#fb923c", icon: "⚜️", desc: "Light infantry matrix optimized for mountainous terrain warfare." },
  { n: "SAS Simonsberg / SAS Diamant (Fleet HQ)", loc: "Simon's Town, W. Cape", lat: -34.1924, lng: 18.4328, level: "BATTALION", color: "#fb923c", icon: "⚜️", desc: "Valour-class guided missile frigates and Type 209 submarine stealth strike command." },
  { n: "4 Special Forces Regiment (Maritime)", loc: "Langebaanweg, W. Cape", lat: -32.9686, lng: 18.1581, level: "COMPANY", color: "#f472b6", icon: "🦅", desc: "Elite specialized maritime reconnaissance and covert diving strike elements." }
];

function App() {
  const [activeNode, setActiveNode] = useState(null);
  const [filterLevel, setFilterLevel] = useState("ALL");
  
  const mapRef = useRef(null);
  const markersLayerRef = useRef(null);

  const filteredHQ = useMemo(() => {
    if (filterLevel === "ALL") return BASE_HQ;
    return BASE_HQ.filter(node => node.level === filterLevel);
  }, [filterLevel]);

  // Hook to safely handle initialization and lifecycle updates for Leaflet Map Frame inside React
  useEffect(() => {
    if (!mapRef.current) {
      // Setup base map viewport centered generally across South African borders
      mapRef.current = L.map('map-viewport-pane', {
        zoomControl: false,
        attributionControl: false
      }).setView([-28.8, 25.0], 6);

      // Dark Theme Tileset Configuration (CartoDB Dark Matter style matching your theme specs)
      L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        maxZoom: 18,
        minZoom: 5
      }).addTo(mapRef.current);

      // Add Zoom Controls contextually in the upper right quadrant
      L.control.zoom({ position: 'topright' }).addTo(mapRef.current);

      // Initialize the global marker storage array layer
      markersLayerRef.current = L.layerGroup().addTo(mapRef.current);
    }
  }, []);

  // Update real-time markers instantly whenever filter matrix changes
  useEffect(() => {
    if (markersLayerRef.current && mapRef.current) {
      markersLayerRef.current.clearLayers();

      filteredHQ.forEach((node) => {
        // Build customized DOM element matching radiating custom radar icons styles
        const customIcon = L.divIcon({
          className: 'leaflet-custom-marker-wrapper',
          iconSize: [30, 30],
          iconAnchor: [15, 15],
          html: `
            <div class="radar-node-container" style="--pulse-color: ${node.color}">
              <div class="pulse-ring"></div>
              <div class="node-core">${node.icon}</div>
            </div>
          `
        });

        const marker = L.marker([node.lat, node.lng], { icon: customIcon });

        // Wire event tracking triggers up to React UI state
        marker.on('mouseover', () => setActiveNode(node));
        marker.on('click', () => routeToMainStructure(node.level, node.n));

        markersLayerRef.current.addLayer(marker);
      });
    }
  }, [filteredHQ]);

  // Simulates jumping back to index.html with structural search parameters
  const routeToMainStructure = (level, nodeName) => {
    const encodedLevel = encodeURIComponent(level);
    const encodedNode = encodeURIComponent(nodeName);
    window.location.href = `index.html?view=${encodedLevel}&search=${encodedNode}`;
  };

  return (
    <div className="fade-in" style={{ minHeight: "100vh", position: "relative", padding: "16px" }}>
      {/* Tactical Header */}
      <div style={{ display: "flex", justifycontent: "space-between", alignItems: "flex-start", marginBottom: "16px", borderBottom: "1px solid #111827", paddingBottom: "12px" }}>
        <div>
          <div style={{ fontSize: "9px", letterSpacing: "3px", color: "#3b82f6" }}>StrATEGIC COMMAND NET</div>
          <div style={{ fontSize: "18px", fontWeight: "900", letterSpacing: "3px", color: "#fff" }}>GEOSPATIAL DEPLOYMENT MAP</div>
          <div style={{ fontSize: "9px", color: "#4b5563", marginTop: "2px" }}>Tracking operational Headquarters. Click any node to open its structural view.</div>
        </div>
        <a href="index.html" style={{
          background: "#0f0f1a", border: "1px solid #374151", color: "#9ca3af",
          padding: "8px 12px", cursor: "pointer", fontSize: "9px", letterSpacing: "2px", textDecoration: "none", borderRadius: "2px", marginLeft: "auto"
        }}><i className="fa-solid fa-bars-staggered" style={{ marginRight: "6px" }}></i> TACTICAL TREE</a>
      </div>

      {/* Layer/Filter Controls */}
      <div style={{ display: "flex", gap: "6px", marginBottom: "14px", flexWrap: "wrap" }}>
        {["ALL", "BATTALION", "COMPANY"].map(l => (
          <button key={l} onClick={() => setFilterLevel(l)} style={{
            background: filterLevel === l ? "#3b82f622" : "transparent",
            color: filterLevel === l ? "#3b82f6" : "#4b5563",
            border: `1px solid ${filterLevel === l ? "#3b82f6" : "#1f2937"}`,
            padding: "6px 12px", fontSize: "9px", letterSpacing: "2px", cursor: "pointer", borderRadius: "2px"
          }}>{l} SCALE NODES</button>
        ))}
      </div>

      <div style={{ display: "flex", gap: "16px", flexWrap: "wrap" }}>
        {/* Real Leaflet Map Engine Container Box */}
        <div style={{
          flex: "1 1 600px", background: "#09090e", 
          border: "1px solid #1f2937", borderRadius: "2px", overflow: "hidden", minHeight: "580px", position: "relative"
        }}>
          <div id="map-viewport-pane" style={{ width: "100%", height: "100%", position: "absolute", inset: 0, zIndex: 1 }}></div>
        </div>

        {/* Real-time Side Telemetry Feed Dashboard */}
        <div style={{ flex: "1 1 280px", display: "flex", flexDirection: "column", gap: "12px", zIndex: 5 }}>
          <div style={{ background: "#0f0f1a", border: "1px solid #1f2937", padding: "14px", borderRadius: "2px" }}>
            <div style={{ fontSize: "9px", letterSpacing: "2px", color: "#6b7280", marginBottom: "8px" }}>TELEMETRY READOUT</div>
            
            {activeNode ? (
              <div className="fade-in">
                <div style={{ display: "flex", alignItems: "center", gap: "8px", marginBottom: "8px" }}>
                  <span style={{ fontSize: "16px" }}>{activeNode.icon}</span>
                  <div>
                    <div style={{ fontSize: "11px", fontWeight: "bold", color: "#fff", lineHeight: "1.3" }}>{activeNode.n}</div>
                    <div style={{ fontSize: "8px", color: activeNode.color, letterSpacing: "1px", marginTop: "2px" }}>{activeNode.level} PROFILE STRUCT</div>
                  </div>
                </div>
                <div style={{ fontSize: "9px", color: "#9ca3af", marginBottom: "8px" }}><i className="fa-solid fa-location-dot" style={{ marginRight: "4px", color: "#ef4444" }}></i> {activeNode.loc}</div>
                <div style={{ fontSize: "10px", color: "#6b7280", lineHeight: "1.6", background: "#060609", padding: "8px", borderLeft: `2px solid ${activeNode.color}` }}>
                  {activeNode.desc}
                </div>
                <div style={{ fontSize: "8px", color: "#3b82f6", marginTop: "10px", textAlign: "right", letterSpacing: "1px" }}>CLICK NODE TO ROUTE TO TREE →</div>
              </div>
            ) : (
              <div style={{ padding: "30px 0", textAlign: "center", color: "#374151", fontSize: "10px" }}>
                <i className="fa-solid fa-satellite-dish" style={{ fontSize: "16px", marginBottom: "8px", display: "block" }}></i>
                HOVER OVER RADAR NODE TO LOCK SIGNALS
              </div>
            )}
          </div>

          {/* Strategic Reference Key Legibility Box */}
          <div style={{ background: "#0f0f1a", border: "1px solid #1f2937", padding: "12px", borderRadius: "2px", fontSize: "9px" }}>
            <div style={{ letterSpacing: "2px", color: "#374151", fontWeight: "bold", marginBottom: "6px" }}>HIERARCHICAL COLOR MATRIX</div>
            <div style={{ display: "flex", flexDirection: "column", gap: "6px" }}>
              <div style={{ display: "flex", alignItems: "center", gap: "6px" }}>
                <span style={{ width: "8px", height: "8px", background: "#fb923c", borderRadius: "50%" }}></span>
                <span style={{ color: "#9ca3af" }}>Battalion Headquarters (600–800 Personnel)</span>
              </div>
              <div style={{ display: "flex", alignItems: "center", gap: "6px" }}>
                <span style={{ width: "8px", height: "8px", background: "#f472b6", borderRadius: "50%" }}></span>
                <span style={{ color: "#9ca3af" }}>Company / Air Squadron Hubs (~110 Personnel)</span>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div style={{ textAlign: "center", marginTop: "24px", color: "#1f2937", fontSize: "8px", letterSpacing: "2px" }}>
        SANDF · GEOSPATIAL COMMAND ROUTER ENGINE · SECURE ENCRYPTED NETWORK FEED
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
</body>
</html>
