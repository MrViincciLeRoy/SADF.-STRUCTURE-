<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SANDF Operational Map</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" />

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #060609; color: #e2e8f0; font-family: 'Courier New', monospace; overflow: hidden; }
  ::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-track { background: #111; } ::-webkit-scrollbar-thumb { background: #2a2a3a; }

  .leaflet-container { background: #060609 !important; font-family: 'Courier New', monospace !important; }
  .leaflet-popup-content-wrapper {
    background: #0a0a0f !important; color: #e2e8f0 !important;
    border: 1px solid #3b82f6 !important; border-radius: 2px !important;
    box-shadow: 0 0 15px rgba(59,130,246,0.2) !important;
  }
  .leaflet-popup-tip { background: #0a0a0f !important; }
  .leaflet-popup-close-button { color: #6b7280 !important; }

  .custom-tactical-marker { background: none; border: none; }

  @keyframes radarPulse {
    0%   { transform: scale(0.6); opacity: 0.9; box-shadow: 0 0 0 0 var(--pulse-color); }
    70%  { transform: scale(1.8); opacity: 0;   box-shadow: 0 0 0 14px transparent; }
    100% { transform: scale(0.6); opacity: 0;   box-shadow: 0 0 0 0 transparent; }
  }
  @keyframes slideInRight {
    from { transform: translateX(100%); opacity: 0; }
    to   { transform: translateX(0);    opacity: 1; }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  .pulse-core {
    width: 22px; height: 22px; border-radius: 50%;
    background: #060609; border: 2px solid var(--pulse-color);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; position: relative; transition: all 0.2s ease; z-index: 5;
    cursor: pointer;
  }
  .pulse-ring {
    position: absolute; width: 32px; height: 32px;
    left: -5px; top: -5px; border-radius: 50%;
    border: 1px solid var(--pulse-color);
    animation: radarPulse 2.4s infinite cubic-bezier(0.25,0,0,1);
    pointer-events: none;
  }
  .pulse-core:hover {
    transform: scale(1.25); background: var(--pulse-color);
    color: #060609 !important; box-shadow: 0 0 18px var(--pulse-color);
  }

  /* ─── SIDE DRAWER ─── */
  .side-drawer {
    position: absolute; top: 0; right: 0; bottom: 0;
    width: 380px; max-width: calc(100vw - 16px);
    z-index: 3000; display: flex; flex-direction: column;
    background: rgba(8, 8, 14, 0.97);
    backdrop-filter: blur(14px);
    border-left: 2px solid var(--drawer-color, #3b82f6);
    box-shadow: -6px 0 40px rgba(0,0,0,0.7);
    animation: slideInRight 0.28s cubic-bezier(0.22, 0.61, 0.36, 1) both;
    overflow: hidden;
  }
  .drawer-header {
    padding: 18px 18px 12px;
    border-bottom: 1px solid #1a1a28;
    flex-shrink: 0;
  }
  .drawer-close {
    position: absolute; top: 14px; right: 14px;
    background: transparent; border: 1px solid #1f2937;
    color: #6b7280; width: 28px; height: 28px;
    cursor: pointer; font-size: 13px; border-radius: 2px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .drawer-close:hover { border-color: #ef4444; color: #ef4444; }
  .drawer-icon-badge {
    width: 46px; height: 46px; border-radius: 50%;
    border: 1.5px solid var(--drawer-color, #3b82f6);
    background: color-mix(in srgb, var(--drawer-color, #3b82f6) 12%, transparent);
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; flex-shrink: 0;
    box-shadow: 0 0 16px color-mix(in srgb, var(--drawer-color, #3b82f6) 30%, transparent);
  }
  .drawer-title { font-size: 13px; font-weight: 900; color: #fff; letter-spacing: 0.8px; line-height: 1.3; }
  .drawer-loc   { font-size: 8.5px; color: var(--drawer-color, #3b82f6); margin-top: 3px; letter-spacing: 1.2px; }
  .drawer-body  { flex: 1; overflow-y: auto; padding: 14px 18px 18px; display: flex; flex-direction: column; gap: 14px; }

  .info-block {
    background: #0c0c18; border: 1px solid #1a1a28;
    border-left: 2px solid var(--drawer-color, #3b82f6);
    padding: 10px 12px; font-size: 10.5px; line-height: 1.7; color: #9ca3af;
  }
  .info-block .label {
    font-size: 7.5px; letter-spacing: 2px; color: var(--drawer-color, #3b82f6);
    font-weight: bold; margin-bottom: 6px; display: block;
  }
  .info-block p { color: #c4cdd8; }

  .badge-row { display: flex; gap: 6px; flex-wrap: wrap; }
  .badge {
    padding: 3px 8px; font-size: 7.5px; letter-spacing: 1px;
    border: 1px solid #1f2937; color: #6b7280; border-radius: 2px; background: #0a0a14;
  }
  .badge.highlight { border-color: var(--drawer-color, #3b82f6); color: var(--drawer-color, #3b82f6); }

  .drawer-footer {
    padding: 12px 18px; border-top: 1px solid #1a1a28; flex-shrink: 0;
  }
  .open-tree-btn {
    width: 100%; padding: 11px; background: var(--drawer-color, #3b82f6); color: #060609;
    border: none; cursor: pointer; font-size: 9.5px; font-weight: bold;
    letter-spacing: 2px; text-transform: uppercase; border-radius: 2px;
    transition: filter 0.15s;
  }
  .open-tree-btn:hover { filter: brightness(1.2); }

  /* Overlay dimmer */
  .map-dimmer {
    position: absolute; inset: 0; z-index: 2500;
    background: rgba(0,0,0,0.35);
    animation: fadeIn 0.2s ease both;
    pointer-events: none;
  }

  /* Filter + header bar */
  .header-panel {
    position: absolute; top: 12px; left: 12px; z-index: 1000;
    background: rgba(6, 6, 9, 0.88); backdrop-filter: blur(8px);
    border: 1px solid #1f2937; padding: 12px 16px; border-radius: 2px;
    max-width: calc(100vw - 80px);
  }
  .filter-btn {
    background: transparent; color: #4b5563;
    border: 1px solid #1f2937; padding: 4px 8px;
    font-size: 8px; letter-spacing: 1px; cursor: pointer; border-radius: 2px;
    font-family: 'Courier New', monospace; transition: all 0.15s;
  }
  .filter-btn.active { background: #3b82f622; color: #3b82f6; border-color: #3b82f6; }

  /* Bottom right legend */
  .legend-panel {
    position: absolute; bottom: 12px; right: 12px; z-index: 1000;
    background: rgba(6,6,9,0.88); border: 1px solid #1f2937;
    padding: 8px 12px; border-radius: 2px; pointer-events: none;
  }
  .legend-dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; margin-right: 6px; }

  /* Coordinate counter */
  .asset-count {
    position: absolute; top: 12px; right: 12px; z-index: 1000;
    background: rgba(6,6,9,0.88); border: 1px solid #1f2937;
    padding: 8px 12px; border-radius: 2px; font-size: 8px; letter-spacing: 1.5px; color: #4b5563;
  }

  @media (max-width: 480px) {
    .side-drawer { width: 100vw; border-left: none; border-top: 2px solid var(--drawer-color, #3b82f6); top: auto; bottom: 0; height: 70vh; animation: slideInBottom 0.28s cubic-bezier(0.22,0.61,0.36,1) both; }
    @keyframes slideInBottom { from { transform: translateY(100%); } to { transform: translateY(0); } }
  }
</style>
</head>

// ── category colours
const CAT_COLORS = {
  "SPECIAL FORCES": "#a78bfa",
  "SAAF":           "#fb923c",
  "SAN":            "#38bdf8",
  "ARMY":           "#22c55e",
  "STRATEGIC":      "#f59e0b"
};

const CATEGORIES = ["ALL", ...Object.keys(CAT_COLORS)];

function App() {
  const [selected, setSelected] = useState(null);
  const [filter, setFilter]     = useState("ALL");
  const mapRef    = useRef(null);
  const markersRef = useRef(null);

  const filtered = useMemo(() =>
    filter === "ALL" ? ASSETS : ASSETS.filter(a => a.cat === filter), [filter]);

  useEffect(() => {
    mapRef.current = L.map('map-viewport', { zoomControl: false, attributionControl: false })
      .setView([-28.5, 25.0], 6);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { maxZoom: 18 })
      .addTo(mapRef.current);
    L.control.zoom({ position: 'topright' }).addTo(mapRef.current);
    markersRef.current = L.layerGroup().addTo(mapRef.current);
    return () => { if (mapRef.current) mapRef.current.remove(); };
  }, []);

  useEffect(() => {
    if (!markersRef.current || !mapRef.current) return;
    markersRef.current.clearLayers();
    filtered.forEach(asset => {
      const html = `
        <div style="position:relative;width:22px;height:22px;--pulse-color:${asset.color}">
          <div class="pulse-ring"></div>
          <div class="pulse-core" style="color:${asset.color}">${asset.icon}</div>
        </div>`;
      const icon = L.divIcon({ className:'custom-tactical-marker', html, iconSize:[22,22], iconAnchor:[11,11] });
      const marker = L.marker([asset.lat, asset.lng], { icon });
      marker.on('click', () => {
        setSelected(asset);
        mapRef.current.setView([asset.lat, asset.lng], 9, { animate: true, duration: 1 });
      });
      markersRef.current.addLayer(marker);
    });
  }, [filtered]);

  const closeDrawer = useCallback(() => setSelected(null), []);

  const catLabel = {
    "SPECIAL FORCES":"Special Forces", "SAAF":"Air Force",
    "SAN":"Navy", "ARMY":"Army", "STRATEGIC":"Strategic / Intel"
  };

  return (
    <div style={{ height:"100vh", width:"100vw", position:"relative", display:"flex", flexDirection:"column" }}>

      {/* Map */}
      <div id="map-viewport" style={{ width:"100%", height:"100vh", zIndex:1 }} />

      {/* Header */}
      <div className="header-panel">
        <div style={{ fontSize:"8px", letterSpacing:"3px", color:"#3b82f6", fontWeight:"bold" }}>● GEOSPATIAL C2 GRID</div>
        <div style={{ fontSize:"15px", fontWeight:"900", letterSpacing:"2px", color:"#fff", marginTop:"2px" }}>SANDF OPERATIONAL FIELD MAP</div>
        <div style={{ fontSize:"9px", color:"#6b7280", marginTop:"4px" }}>Select a radar node to open the intelligence panel.</div>
        <div style={{ display:"flex", gap:"4px", marginTop:"10px", flexWrap:"wrap" }}>
          {CATEGORIES.map(c => (
            <button key={c} className={`filter-btn${filter===c?" active":""}`} onClick={() => setFilter(c)}>
              {c === "ALL" ? "ALL" : catLabel[c] || c}
            </button>
          ))}
          <a href="index.html" style={{
            background:"#0f0f1a", border:"1px solid #374151", color:"#9ca3af",
            padding:"4px 8px", fontSize:"8px", letterSpacing:"1px", textDecoration:"none",
            borderRadius:"2px", marginLeft:"6px", alignSelf:"center"
          }}><i className="fa-solid fa-arrow-left"></i> TREE</a>
        </div>
      </div>

      {/* Asset count */}
      <div className="asset-count">
        <span style={{ color:"#3b82f6", fontWeight:"bold" }}>{filtered.length}</span> NODES ACTIVE
      </div>

      {/* Legend */}
      {!selected && (
        <div className="legend-panel" style={{ bottom: 12 }}>
          <div style={{ fontSize:"7px", color:"#4b5563", letterSpacing:"1px", marginBottom:"6px", fontWeight:"bold" }}>FORCE BRANCH</div>
          {Object.entries(CAT_COLORS).map(([cat, col]) => (
            <div key={cat} style={{ display:"flex", alignItems:"center", gap:"6px", fontSize:"8px", color:"#9ca3af", marginBottom:"3px" }}>
              <span className="legend-dot" style={{ background: col }}></span>
              {catLabel[cat]}
            </div>
          ))}
        </div>
      )}

      {/* Dimmer */}
      {selected && <div className="map-dimmer" />}

      {/* ─── SIDE DRAWER ─── */}
      {selected && (
        <div
          className="side-drawer"
          style={{ "--drawer-color": selected.color }}
          key={selected.n}
        >
          <div className="drawer-header" style={{ paddingRight: 52 }}>
            <div style={{ display:"flex", gap:"12px", alignItems:"flex-start" }}>
              <div className="drawer-icon-badge" style={{ "--drawer-color": selected.color }}>
                {selected.icon}
              </div>
              <div style={{ flex:1 }}>
                <div className="drawer-title">{selected.n}</div>
                <div className="drawer-loc">📍 {selected.loc}</div>
                <div style={{ marginTop:"8px" }}>
                  <span style={{
                    fontSize:"7px", letterSpacing:"1.5px", padding:"2px 8px",
                    border:`1px solid ${selected.color}`, color: selected.color,
                    borderRadius:"2px", background:`${selected.color}15`
                  }}>{selected.cat} · {selected.level}</span>
                </div>
              </div>
            </div>
          </div>

          <button className="drawer-close" onClick={closeDrawer} title="Close">✕</button>

          <div className="drawer-body">

            {/* Summary */}
            <div className="info-block" style={{ "--drawer-color": selected.color }}>
              <span className="label">■ OPERATIONAL SUMMARY</span>
              <p>{selected.r}</p>
            </div>

            {/* Unit Structure */}
            <div className="info-block" style={{ "--drawer-color": selected.color }}>
              <span className="label">■ UNIT STRUCTURE & COMPOSITION</span>
              <p>{selected.structure}</p>
            </div>

            {/* Origin / Why created */}
            <div className="info-block" style={{ "--drawer-color": selected.color }}>
              <span className="label">■ ORIGIN — WHY THIS UNIT WAS FORMED</span>
              <p>{selected.origin}</p>
            </div>

            {/* Location rationale */}
            <div className="info-block" style={{ "--drawer-color": selected.color }}>
              <span className="label">■ LOCATION RATIONALE — WHY HERE</span>
              <p>{selected.location_rationale}</p>
            </div>

            {/* Tags */}
            <div>
              <div style={{ fontSize:"7.5px", letterSpacing:"2px", color:"#4b5563", marginBottom:"6px", fontWeight:"bold" }}>CAPABILITY TAGS</div>
              <div className="badge-row">
                {selected.tags.map(t => (
                  <span key={t} className="badge highlight">{t}</span>
                ))}
              </div>
            </div>

            {/* Coordinates */}
            <div className="info-block" style={{ "--drawer-color": selected.color }}>
              <span className="label">■ GRID REFERENCE</span>
              <p style={{ fontFamily:"'Courier New',monospace", fontSize:"11px", color:"#6b7280" }}>
                {Math.abs(selected.lat).toFixed(4)}°{selected.lat<0?"S":"N"} &nbsp;
                {Math.abs(selected.lng).toFixed(4)}°{selected.lng>0?"E":"W"}
              </p>
            </div>
          </div>

          <div className="drawer-footer">
            <button
              className="open-tree-btn"
              onClick={() => { window.location.href = `index.html?view=${encodeURIComponent(selected.level)}&search=${encodeURIComponent(selected.n)}`; }}
              style={{ "--drawer-color": selected.color, background: selected.color }}
            >
              <i className="fa-solid fa-arrow-up-right-from-square" style={{ marginRight:"6px" }}></i>
              Open Branch Structural Intelligence Tree
            </button>
          </div>
        </div>
      )}

    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
