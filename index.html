.giant-map-btn i{font-size:13px}

.slider-track{display:flex;transition:transform 0.35s cubic-bezier(.4,0,.2,1)}
.slider-wrap{overflow:hidden;position:relative}
.dot-nav{display:flex;gap:6px;justify-content:center;margin-top:10px}
.dot-nav span{width:6px;height:6px;border-radius:50%;background:#374151;cursor:pointer;transition:all 0.2s}
.dot-nav span.active{background:#22d3ee;width:14px;border-radius:3px}

.branch-badge{font-size:8px;letter-spacing:1.5px;padding:2px 6px;border-radius:2px;font-weight:700;display:inline-block}

.swipe-hint{animation:swipeHint 2s ease-in-out 1.5s 2}

/* ─────────────────────────── TYPING DYK COMPONENT ─────────────────────────── */
function TypingDYK({level}) {
  const facts = DYK[level] || [];
  const [factIdx, setFactIdx] = useState(0);
  const [displayed, setDisplayed] = useState("");
  const [typing, setTyping] = useState(true);
  const [phase, setPhase] = useState("typing"); // typing | hold | erasing
  const timerRef = useRef(null);

  useEffect(() => {
    setFactIdx(0);
    setDisplayed("");
    setPhase("typing");
  }, [level]);

  useEffect(() => {
    if (!facts.length) return;
    const full = facts[factIdx].note;
    clearTimeout(timerRef.current);

    if (phase === "typing") {
      if (displayed.length < full.length) {
        timerRef.current = setTimeout(() => {
          setDisplayed(full.slice(0, displayed.length + 1));
        }, 18);
      } else {
        timerRef.current = setTimeout(() => setPhase("hold"), 3500);
      }
    } else if (phase === "hold") {
      timerRef.current = setTimeout(() => setPhase("erasing"), 800);
    } else if (phase === "erasing") {
      if (displayed.length > 0) {
        timerRef.current = setTimeout(() => {
          setDisplayed(displayed.slice(0, -2));
        }, 8);
      } else {
        const next = (factIdx + 1) % facts.length;
        setFactIdx(next);
        setPhase("typing");
      }
    }
    return () => clearTimeout(timerRef.current);
  }, [phase, displayed, factIdx, facts]);

  if (!facts.length) return null;
  const cur = facts[factIdx];
  const progress = (factIdx / facts.length) * 100 + (displayed.length / (cur.note.length || 1)) * (100 / facts.length);

  return (
    <div style={{marginTop:20,background:"#080810",border:"1px solid #1f2937",borderLeft:"3px solid #22d3ee",borderRadius:2,padding:"14px 16px",position:"relative",overflow:"hidden"}}>
      {/* progress bar */}
      <div style={{position:"absolute",top:0,left:0,height:2,background:"#22d3ee33",width:"100%"}}>
        <div style={{height:"100%",background:"#22d3ee",width:`${progress}%`,transition:"width 0.1s"}}/>
      </div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <div style={{fontSize:9,letterSpacing:3,color:"#22d3ee"}}>● DID YOU KNOW</div>
          <div style={{fontSize:18}}>{cur.icon}</div>
        </div>
        <div style={{display:"flex",gap:4}}>
          {facts.map((_,i)=>(

/* ─────────────────────────── SPECIAL UNITS SLIDER ─────────────────────────── */
function SpecialUnitsSlider({level}) {
  const units = SPECIAL_UNITS[level] || [];
  const [idx, setIdx] = useState(0);
  const [dragStart, setDragStart] = useState(null);
  const [offset, setOffset] = useState(0);
  const [hintShown, setHintShown] = useState(false);

  useEffect(() => { setIdx(0); setOffset(0); }, [level]);

  const go = (dir) => {
    setIdx(i => Math.max(0, Math.min(units.length-1, i+dir)));
    setOffset(0);
  };

  const handleTouchStart = (e) => setDragStart(e.touches[0].clientX);
  const handleTouchEnd = (e) => {
    if (dragStart === null) return;
    const diff = dragStart - e.changedTouches[0].clientX;
    if (Math.abs(diff) > 40) go(diff > 0 ? 1 : -1);
    setDragStart(null);
  };
  const handleMouseDown = (e) => setDragStart(e.clientX);
  const handleMouseUp = (e) => {
    if (dragStart === null) return;
    const diff = dragStart - e.clientX;
    if (Math.abs(diff) > 40) go(diff > 0 ? 1 : -1);
    setDragStart(null);
  };

  if (!units.length) return null;
  const u = units[idx];
  const branchColor = BRANCH_COLORS[u.branch] || "#9ca3af";

  return (
    <div style={{marginTop:16}}>
      <div style={{fontSize:9,letterSpacing:3,color:"#374151",marginBottom:10,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <span>◆ SPECIAL UNITS ATTACHED TO THIS LEVEL</span>
        <span style={{fontSize:8,color:"#4b5563"}}>← SWIPE →</span>
      </div>
      <div
        style={{userSelect:"none",cursor:"grab",touchAction:"pan-y"}}
        onTouchStart={handleTouchStart} onTouchEnd={handleTouchEnd}
        onMouseDown={handleMouseDown} onMouseUp={handleMouseUp}
      >
        <div className="fade-in" key={`${level}-${idx}`} style={{
          background:"#08080f",border:`1px solid ${branchColor}44`,
          borderTop:`3px solid ${branchColor}`,borderRadius:2,padding:"14px 16px",
        }}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10,flexWrap:"wrap",gap:6}}>
            <div style={{display:"flex",gap:10,alignItems:"center"}}>
              <div style={{fontSize:28}}>{u.icon}</div>
              <div>
                <div style={{fontSize:12,fontWeight:700,color:"#fff",letterSpacing:1}}>{u.name}</div>
                <div style={{marginTop:3}}>
                  <span className="branch-badge" style={{background:branchColor+"22",color:branchColor,border:`1px solid ${branchColor}55`}}>
                    {u.branch}
                  </span>
                </div>
              </div>
            </div>
            <div style={{fontSize:9,color:branchColor,background:branchColor+"11",padding:"4px 8px",border:`1px solid ${branchColor}33`,borderRadius:2}}>
              ▪ {u.size}
            </div>
          </div>
          <div style={{fontSize:10,color:"#9ca3af",lineHeight:1.8,marginBottom:12,borderBottom:"1px solid #1f2937",paddingBottom:12}}>
            {u.desc}
          </div>
          <div>
            <div style={{fontSize:9,letterSpacing:2,color:branchColor,marginBottom:8,fontWeight:700}}>KEY EQUIPMENT</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
              {u.equipment.map((e,i)=>(
                <div key={i} style={{fontSize:9,color:"#6b7280",background:"#111119",border:`1px solid #1f2937`,padding:"3px 7px",borderRadius:2,lineHeight:1.5}}>
                  {e}
                </div>
              ))}
            </div>
          </div>
        </div>
      </div>
      {/* dots nav */}
      <div className="dot-nav">
        {units.map((_,i)=>(
          <span key={i} className={i===idx?"active":""} onClick={()=>setIdx(i)}
            style={{width:i===idx?14:6,height:6,borderRadius:3,background:i===idx?BRANCH_COLORS[units[i].branch]||"#22d3ee":"#374151",cursor:"pointer",transition:"all 0.2s",display:"inline-block"}}
          />
        ))}
      </div>
      {/* prev/next buttons */}
      <div style={{display:"flex",justifyContent:"center",gap:8,marginTop:8}}>
        <button onClick={()=>go(-1)} disabled={idx===0} style={{
          background:"transparent",border:"1px solid #1f2937",color:idx===0?"#1f2937":"#9ca3af",
          padding:"4px 12px",cursor:idx===0?"default":"pointer",fontSize:10,borderRadius:2,
        }}>◀ PREV</button>
        <button onClick={()=>go(1)} disabled={idx===units.length-1} style={{
          background:"transparent",border:"1px solid #1f2937",color:idx===units.length-1?"#1f2937":"#9ca3af",
          padding:"4px 12px",cursor:idx===units.length-1?"default":"pointer",fontSize:10,borderRadius:2,
        }}>NEXT ▶</button>
      </div>
    </div>
  );
}

                    onMouseLeave={e=>e.currentTarget.style.background="#0a0a0f"}
                  >
                    <div style={{fontSize:22,marginBottom:4}}>{d.icon}</div>
                    <div style={{fontSize:10,fontWeight:700,color:d.color}}>{r}</div>
                    <div style={{fontSize:9,color:"#6b7280",marginTop:2}}>{d.rank}</div>
                    <div style={{fontSize:9,color:"#4b5563",marginTop:3,lineHeight:1.5}}>{d.weapon}</div>
                  </div>
                );
              })}
            </div>
          </div>
        )}
        {view==="SECTION"   && <div style={{maxWidth:560}}><Sec mini={false} onSel={onSel}/></div>}
        {view==="PLATOON"   && <Plt mini={false} onSel={onSel}/>}
        {view==="COMPANY"   && <Coy mini={false} onSel={onSel}/>}
        {view==="BATTALION" && <Bn onSel={onSel}/>}
      </div>

      {/* TYPING DYK */}
      <TypingDYK level={view}/>

      {/* SPECIAL UNITS SLIDER */}
      <SpecialUnitsSlider level={view}/>

      {/* level nav */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"center",flexWrap:"wrap",marginTop:24,gap:0}}>
        {LVLS.map((l,i)=>(
          <div key={l.label} style={{display:"flex",alignItems:"center"}}>
            <div onClick={()=>setView(l.label)} style={{
              padding:"6px 10px",cursor:"pointer",textAlign:"center",
              background:view===l.label?l.color+"22":"#0f0f1a",
              border:`1px solid ${l.color}${view===l.label?"":"44"}`,borderRadius:2,
            }}>
              <div style={{fontSize:9,fontWeight:700,color:l.color,letterSpacing:2}}>{l.short}</div>
              <div style={{fontSize:8,color:"#4b5563"}}>{l.s}</div>
            </div>
            {i<LVLS.length-1 && <div style={{fontSize:9,color:"#374151",padding:"0 3px"}}>×3→</div>}
          </div>
        ))}
      </div>

      <div style={{textAlign:"center",marginTop:20,color:"#1f2937",fontSize:8,letterSpacing:2}}>
        SANDF · SA ARMY INFANTRY STRUCTURE · EDUCATIONAL REFERENCE ONLY
      </div>

      <Sheet rk={sel} onClose={()=>setSel(null)}/>
      <Drawer open={drawer} onClose={()=>setDrawer(false)}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
