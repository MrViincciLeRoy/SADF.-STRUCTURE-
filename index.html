/* High visibility tactical glow styling for map interface route link */
.giant-map-btn {

  font-weight: bold;

  letter-spacing: 2px;
  text-transform: uppercase;
  transition: all 0.2s ease;
  box-shadow: 0 4px 12px rgba(59, 130, 246, 0.1);
}
.giant-map-btn:hover {
  background: #3b82f6;
  color: #060609;
  box-shadow: 0 0 15px rgba(59, 130, 246, 0.4);
}
.giant-map-btn i {

function SoldierDot({rk, size=28, showLabel=true, onSel}) {
  const d = SD[rk];

  const [hov, setHov] = useState(false);
  return (
    <div onClick={()=>onSel(rk)} style={{display:"inline-flex",flexDirection:"column",alignItems:"center",cursor:"pointer",gap:3}}>
      <div style={{
        width:size,height:size,borderRadius:"50%",

                  <div key={r} onClick={()=>onSel(r)} style={{
                    background:"#0a0a0f",border:`1px solid ${d.color}44`,
                    borderLeft:`3px solid ${d.color}`,padding:"10px 12px",cursor:"pointer",borderRadius:2,
                  }}
                    onMouseEnter={e=>e.currentTarget.style.background=d.color+"11"}
                    onMouseLeave={e=>e.currentTarget.style.background="#0a0a0f"}
                  >
                    <div style={{fontSize:22,marginBottom:4}}>{d.icon}</div>
                    <div style={{fontSize:10,fontWeight:700,color:d.color}}>{r}</div>
                    <div style={{fontSize:9,color:"#6b7280",marginTop:2}}>{d.rank}</div>
                    <div style={{fontSize:9,color:"#4b5563",marginTop:3,lineHeight:1.5}}>{d.weapon}</div>
                  </div>
                );
              })}
            </div>
          </div>
        )}
        {view==="SECTION"   && <div style={{maxWidth:560}}><Sec mini={false} onSel={onSel}/></div>}
        {view==="PLATOON"   && <Plt mini={false} onSel={onSel}/>}
        {view==="COMPANY"   && <Coy mini={false} onSel={onSel}/>}
        {view==="BATTALION" && <Bn onSel={onSel}/>}
      </div>

      <DYKCards level={view}/>

      <div style={{display:"flex",alignItems:"center",justifyContent:"center",flexWrap:"wrap",marginTop:24,gap:0}}>
        {LVLS.map((l,i)=>(
          <div key={l.label} style={{display:"flex",alignItems:"center"}}>
            <div onClick={()=>setView(l.label)} style={{
              padding:"6px 10px",cursor:"pointer",textAlign:"center",
              background:view===l.label?l.color+"22":"#0f0f1a",
              border:`1px solid ${l.color}${view===l.label?"":"44"}`,borderRadius:2,
            }}>
              <div style={{fontSize:9,fontWeight:700,color:l.color,letterSpacing:2}}>{l.short}</div>
              <div style={{fontSize:8,color:"#4b5563"}}>{l.s}</div>
            </div>
            {i<LVLS.length-1 && <div style={{fontSize:9,color:"#374151",padding:"0 3px"}}>×3→</div>}
          </div>
        ))}
      </div>

      <div style={{textAlign:"center",marginTop:20,color:"#1f2937",fontSize:8,letterSpacing:2}}>
        SANDF · SA ARMY INFANTRY STRUCTURE · EDUCATIONAL REFERENCE ONLY
      </div>

      <Sheet rk={sel} onClose={()=>setSel(null)}/>
      <Drawer open={drawer} onClose={()=>setDrawer(false)}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
