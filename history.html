    color: "#06b6d4",
    icon: "🌊",
    shortDesc: "The Difaqane produced multiple competing military doctrines as dozens of groups fought for survival across a collapsing regional order.",
    context: "The Difaqane (Sotho: 'the crushing') / Mfecane (Zulu: 'the hammering') was a period of near-total regional state collapse across Southern Africa. Triggered partly by Zulu expansionism, climate stress (drought), trade disruption, and the rise of competing military powers, it produced a cascade of forced migrations, refugee armies, and new military-political formations. At least 1-2 million people died. New states emerged from the chaos — Basotho, Swazi, Ndebele, Gaza — each with distinctive military adaptations.",

    doctrinalScore: { rankSystem: 10, commandStructure: 40, fieldTactics: 65, logistics: 45, weaponSystem: 35 },

const DOC_AREAS = ["rankSystem","commandStructure","fieldTactics","logistics","weaponSystem"];
const DOC_LABELS = { rankSystem:"Rank System", commandStructure:"Command Structure", fieldTactics:"Field Tactics", logistics:"Logistics", weaponSystem:"Weapon Systems" };
const DOC_COLORS = { rankSystem:"#4ade80", commandStructure:"#22d3ee", fieldTactics:"#f59e0b", logistics:"#818cf8", weaponSystem:"#ef4444" };

function DoctrineBar({ area, score, color }) {
  return (
    <div style={{ marginBottom: 6 }}>
      <div style={{ display: "flex", justifyContent: "space-between", fontSize: 8, color: "#6b7280", marginBottom: 3, letterSpacing: 1 }}>
        <span>{DOC_LABELS[area]}</span>
        <span style={{ color }}>{score}%</span>
      </div>
      <div style={{ background: "#1f2937", height: 3, borderRadius: 1, overflow: "hidden" }}>
        <div style={{ width: `${score}%`, height: "100%", background: color, borderRadius: 1, transition: "width 0.6s ease" }} />
      </div>
    </div>
  );
}

function StructuralCard({ item }) {
  return (
    <div style={{ background: "#0a0a14", border: "1px solid #1f2937", borderLeft: "3px solid #374151", padding: "10px 12px", borderRadius: 2 }}>
      <div style={{ fontSize: 9, color: "#9ca3af", fontWeight: "bold", letterSpacing: 1, marginBottom: 4 }}>{item.label}</div>
      <div style={{ fontSize: 10, color: "#6b7280", lineHeight: 1.7 }}>{item.desc}</div>
    </div>
  );
}

function TimelineCard({ data, isSelected, onSelect, index }) {
  return (
    <div style={{ position: "relative", paddingLeft: 32, marginBottom: 20 }}>
      {/* Timeline node */}
      <div style={{
        position: "absolute", left: 12, top: 18, width: 14, height: 14, borderRadius: "50%",
        background: data.color + "22", border: `2px solid ${data.color}`,
        display: "flex", alignItems: "center", justifyContent: "center",
        fontSize: 7, zIndex: 2
      }}>
        <div style={{ width: 5, height: 5, borderRadius: "50%", background: data.color }} />
      </div>

      <div
        onClick={onSelect}
        className="fade-in"
        style={{
          background: isSelected ? "#0d1117" : "#0c0c14",
          border: `1px solid ${isSelected ? data.color : "#1a1a2e"}`,
          borderLeft: `4px solid ${data.color}`,
          padding: "14px 16px",
          cursor: "pointer",
          borderRadius: 2,
          transition: "all 0.2s ease",
          boxShadow: isSelected ? `0 0 20px ${data.color}11` : "none"
        }}
      >
        {/* Header */}
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 8, marginBottom: 8 }}>
          <div>
            <div style={{ fontSize: 8, color: data.color, letterSpacing: 2, fontWeight: "bold", marginBottom: 3 }}>{data.era}</div>
            <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
              <span style={{ fontSize: 18 }}>{data.icon}</span>
              <h3 style={{ fontSize: 12, color: "#fff", letterSpacing: 1, lineHeight: 1.3 }}>{data.title}</h3>
            </div>
          </div>
          <div style={{ flexShrink: 0, textAlign: "right" }}>
            <div style={{ fontSize: 9, background: data.color + "22", color: data.color, padding: "3px 7px", borderRadius: 2, fontWeight: "bold", letterSpacing: 1, whiteSpace: "nowrap" }}>{data.date}</div>
          </div>
        </div>

        {/* Tags */}
        <div style={{ marginBottom: 8 }}>
          {(data.tags || []).map((t, i) => (
            <span key={i} className="tag" style={{ background: data.color + "11", color: data.color, border: `1px solid ${data.color}33` }}>{t}</span>
          ))}
        </div>

        <p style={{ fontSize: 10, color: "#9ca3af", lineHeight: 1.7 }}>{data.shortDesc}</p>

        {/* Collapsed hint */}
        {!isSelected && (
          <div style={{ fontSize: 8, color: "#374151", marginTop: 10, textAlign: "right", letterSpacing: 1 }}>
            TAP TO EXPAND FULL DOCTRINAL PROFILE ▽
          </div>
        )}

        {/* Expanded content */}
        {isSelected && (
          <div className="fade-in" style={{ marginTop: 16, paddingTop: 14, borderTop: "1px dashed #1f2937" }}>

            {/* Context */}
            <div style={{ marginBottom: 14 }}>
              <div style={{ fontSize: 8, color: data.color, letterSpacing: 2, fontWeight: "bold", marginBottom: 6 }}>HISTORICAL CONTEXT</div>
              <p style={{ fontSize: 10, color: "#9ca3af", lineHeight: 1.8 }}>{data.context}</p>
            </div>

            {/* Forces */}
            <div style={{ marginBottom: 14 }}>
              <div style={{ fontSize: 8, color: data.color, letterSpacing: 2, fontWeight: "bold", marginBottom: 6 }}>OPERATIONAL FORCES</div>
              <div style={{ display: "flex", flexWrap: "wrap", gap: 4 }}>
                {data.forces.map((f, i) => (
                  <div key={i} style={{ fontSize: 9, color: "#e2e8f0", background: "#111827", border: "1px solid #1f2937", padding: "3px 8px", borderRadius: 2, lineHeight: 1.5 }}>{f}</div>
                ))}
              </div>
            </div>

            {/* Tactics */}
            <div style={{ marginBottom: 14 }}>
              <div style={{ fontSize: 8, color: data.color, letterSpacing: 2, fontWeight: "bold", marginBottom: 6 }}>DOCTRINE & TACTICS</div>
              <p style={{ fontSize: 10, color: "#9ca3af", lineHeight: 1.8 }}>{data.tactics}</p>
            </div>

            {/* Weapons */}
            <div style={{ marginBottom: 14 }}>
              <div style={{ fontSize: 8, color: data.color, letterSpacing: 2, fontWeight: "bold", marginBottom: 6 }}>WEAPONRY & TECHNOLOGY</div>
              <p style={{ fontSize: 10, color: "#9ca3af", lineHeight: 1.8 }}>{data.weapons}</p>
            </div>

            {/* What this conflict added */}
            <div style={{ marginBottom: 14 }}>
              <div style={{ fontSize: 8, color: data.color, letterSpacing: 2, fontWeight: "bold", marginBottom: 8 }}>STRUCTURAL CONTRIBUTIONS TO MODERN SANDF</div>
              <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                {(data.structuralAdditions || []).map((item, i) => (
                  <StructuralCard key={i} item={item} />
                ))}
              </div>
            </div>

            {/* Doctrinal impact scores */}
            {data.doctrinalScore && (
              <div style={{ marginBottom: 14, padding: "12px 14px", background: "#080810", border: "1px solid #1f2937", borderRadius: 2 }}>
                <div style={{ fontSize: 8, color: "#374151", letterSpacing: 2, fontWeight: "bold", marginBottom: 10 }}>DOCTRINAL IMPACT SCORE</div>
                {DOC_AREAS.map(area => (
                  <DoctrineBar key={area} area={area} score={data.doctrinalScore[area] || 0} color={DOC_COLORS[area]} />
                ))}
              </div>
            )}

            {/* Legacy */}
            <div style={{ padding: "12px 14px", background: data.color + "0a", border: `1px solid ${data.color}22`, borderRadius: 2 }}>
              <div style={{ fontSize: 8, color: data.color, letterSpacing: 2, fontWeight: "bold", marginBottom: 6 }}>EVOLUTIONARY IMPACT TO TODAY'S STRUCTURE</div>
              <p style={{ fontSize: 10, color: "#e2e8f0", lineHeight: 1.8 }}>{data.legacy}</p>
            </div>

          </div>
        )}
      </div>
    </div>
  );
}

function App() {
  const [selectedIdx, setSelectedIdx] = useState(null);
  const [searchQuery, setSearchQuery] = useState("");
  const [filterTag, setFilterTag] = useState(null);

  const allTags = [...new Set(TIMELINE_DATA.flatMap(d => d.tags || []))];

  const filteredData = TIMELINE_DATA.filter(item => {
    const q = searchQuery.toLowerCase();
    const matchesSearch = !q || item.era.toLowerCase().includes(q) || item.title.toLowerCase().includes(q) || item.context.toLowerCase().includes(q) || (item.tags||[]).some(t=>t.toLowerCase().includes(q));
    const matchesTag = !filterTag || (item.tags||[]).includes(filterTag);
    return matchesSearch && matchesTag;
  });

  const totalEras = TIMELINE_DATA.length;

  return (
    <div style={{ minHeight: "100vh", background: "#060609", color: "#e2e8f0", padding: "16px", maxWidth: 800, margin: "0 auto" }}>

      {/* Header */}
      <div style={{ borderBottom: "1px solid #1a1a2e", paddingBottom: 16, marginBottom: 18 }}>
        <div style={{ fontSize: 8, letterSpacing: 4, color: "#fb923c", marginBottom: 4 }}>SANDF · MILITARY EVOLUTION · CHRONOLOGICAL ANALYSIS</div>
        <div style={{ fontSize: 20, fontWeight: 900, letterSpacing: 3, color: "#fff", lineHeight: 1.1 }}>HISTORICAL CHRONOLOGY</div>
        <div style={{ fontSize: 9, color: "#374151", marginTop: 6, lineHeight: 1.7 }}>
          Vertical lineage mapping {totalEras} eras of structural development, tactical innovation, and weapon systems that formed current SANDF defensive doctrine. Each era documents what it specifically contributed to today's military structure.
        </div>
        <div style={{ display: "flex", gap: 16, marginTop: 10, flexWrap: "wrap" }}>
          {[
            { label: "ERAS DOCUMENTED", val: totalEras },
            { label: "CENTURIES COVERED", val: "3.5" },
            { label: "STRUCTURAL CONTRIBUTIONS", val: TIMELINE_DATA.reduce((a,d)=>a+(d.structuralAdditions||[]).length,0) },
          ].map((s,i) => (
            <div key={i} style={{ textAlign: "center" }}>
              <div style={{ fontSize: 18, fontWeight: 900, color: "#fb923c" }}>{s.val}</div>
              <div style={{ fontSize: 7, color: "#374151", letterSpacing: 1 }}>{s.label}</div>
            </div>
          ))}
        </div>
      </div>

      {/* Doctrinal Factor Panel */}
      <div style={{ background: "#0c0c14", border: "1px solid #1a1a2e", borderLeft: "3px solid #fb923c", padding: "10px 14px", fontSize: 9, color: "#9ca3af", marginBottom: 16, letterSpacing: 1, lineHeight: 1.8 }}>
        <span style={{ color: "#fb923c", fontWeight: "bold" }}>DOCTRINAL SYNTHESIS:</span> Modern SANDF small-unit autonomy is not purely European. It is an evolutionary synthesis of decentralized Boer Commando structures, hyper-aggressive Zulu encirclement vectors, colonial-era self-sufficiency imperatives, and the arduous counter-insurgency lessons of the mid-20th-century bush campaigns. Each era below documents precisely what it contributed to the structure you see today.
      </div>

      {/* Search */}
      <div style={{ marginBottom: 10 }}>
        <input
          type="text"
          placeholder="FILTER BY ERA, TACTIC, WEAPON, OR KEYWORD..."
          value={searchQuery}
          onChange={e => { setSearchQuery(e.target.value); setSelectedIdx(null); }}
          style={{
            width: "100%", background: "#0a0a0f", border: "1px solid #1f2937",
            color: "#fff", padding: "10px 12px", fontSize: 10,
            fontFamily: "'Courier New', monospace", letterSpacing: 1, borderRadius: 2
          }}
        />
      </div>

      {/* Tag filters */}
      <div style={{ marginBottom: 18, display: "flex", flexWrap: "wrap", gap: 4 }}>
        <button
          onClick={() => setFilterTag(null)}
          style={{
            background: !filterTag ? "#374151" : "transparent",
            color: !filterTag ? "#fff" : "#374151",
            border: "1px solid #374151", fontSize: 8, padding: "3px 8px",
            cursor: "pointer", letterSpacing: 1, borderRadius: 2, fontFamily: "'Courier New', monospace"
          }}
        >ALL</button>
        {allTags.map((tag, i) => (
          <button
            key={i}
            onClick={() => setFilterTag(filterTag === tag ? null : tag)}
            style={{
              background: filterTag === tag ? "#1f2937" : "transparent",
              color: filterTag === tag ? "#e2e8f0" : "#4b5563",
              border: `1px solid ${filterTag === tag ? "#374151" : "#1f2937"}`,
              fontSize: 8, padding: "3px 8px", cursor: "pointer", letterSpacing: 1,
              borderRadius: 2, fontFamily: "'Courier New', monospace"
            }}
          >{tag}</button>
        ))}
      </div>

      {/* Doctrinal Score Legend */}
      <div style={{ background: "#080810", border: "1px solid #1a1a2e", padding: "8px 12px", marginBottom: 16, borderRadius: 2 }}>
        <div style={{ fontSize: 7, color: "#374151", letterSpacing: 2, marginBottom: 6 }}>DOCTRINAL IMPACT SCORE LEGEND</div>
        <div style={{ display: "flex", flexWrap: "wrap", gap: 12 }}>
          {DOC_AREAS.map(area => (
            <div key={area} style={{ display: "flex", alignItems: "center", gap: 5 }}>
              <div style={{ width: 8, height: 8, borderRadius: 1, background: DOC_COLORS[area] }} />
              <span style={{ fontSize: 8, color: "#6b7280", letterSpacing: 1 }}>{DOC_LABELS[area]}</span>
            </div>
          ))}
        </div>
      </div>

      {/* Timeline */}
      <div style={{ position: "relative" }}>
        <div className="timeline-line" />
        {filteredData.length > 0 ? (
          filteredData.map((eraData, idx) => (
            <TimelineCard
              key={idx}
              data={eraData}
              index={idx}
              isSelected={selectedIdx === idx}
              onSelect={() => setSelectedIdx(selectedIdx === idx ? null : idx)}
            />
          ))
        ) : (
          <div style={{ fontSize: 10, color: "#374151", textAlign: "center", padding: "30px", letterSpacing: 2 }}>
            NO MILITARY RECORDS MATCHING QUERY PARAMETERS.
          </div>
        )}
      </div>

      {/* Synthesis Panel */}
      <div style={{ marginTop: 24, padding: "16px", background: "#0c0c14", border: "1px solid #1a1a2e", borderTop: "2px solid #fb923c", borderRadius: 2 }}>
        <div style={{ fontSize: 9, letterSpacing: 3, color: "#fb923c", marginBottom: 10, fontWeight: "bold" }}>STRUCTURAL LINEAGE SUMMARY</div>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
          {[
            { src: "Khoikhoi-Dutch Wars (1659+)", contrib: "Commando system, tracker auxiliaries, elected leadership" },
            { src: "Zulu Military Revolution (1816)", contrib: "Regimental identity, standardized equipment, reserve doctrine" },
            { src: "Anglo-Boer Wars (1880-1902)", contrib: "Mission command, marksmanship culture, camouflage" },
            { src: "Union Defence Forces (1912-1945)", contrib: "Rank table, G1-G4 staff system, corps branches" },
            { src: "Operation Savannah (1975-76)", contrib: "Combined arms planning, logistics reach, anti-armor doctrine" },
            { src: "Border War (1966-1989)", contrib: "Battle group doctrine, fire team autonomy, COIN cell" },
            { src: "1994 Integration", contrib: "Joint operations, democratic oversight, rights-based ROE" },
          ].map((item, i) => (
            <div key={i} style={{ background: "#080810", padding: "8px 10px", border: "1px solid #111827", borderRadius: 2 }}>
              <div style={{ fontSize: 8, color: "#fb923c", letterSpacing: 1, marginBottom: 3, fontWeight: "bold" }}>{item.src}</div>
              <div style={{ fontSize: 9, color: "#6b7280", lineHeight: 1.6 }}>{item.contrib}</div>
            </div>
          ))}
        </div>
      </div>

      {/* Return nav */}
      <div style={{ marginTop: 20 }}>
        <a href="index.html" className="giant-map-btn">
          <span><i className="fa-solid fa-shield-halved" style={{ marginRight: 8 }}></i>Return to Tactical Structure</span>
          <i className="fa-solid fa-chevron-right"></i>
        </a>
      </div>

      <div style={{ textAlign: "center", marginTop: 16, color: "#111827", fontSize: 7, letterSpacing: 2 }}>
        SANDF EVOLUTIONARY CHRONOLOGY · REACT · EDUCATIONAL REFERENCE ONLY
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
